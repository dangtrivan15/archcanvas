name: Build Images

on:
  workflow_dispatch:
  repository_dispatch:
  push:
    branches: [main]
    paths:
      - 'src-web/**'
      - 'Dockerfile'
      - 'nginx.conf'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-images.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-web:
    runs-on: arc-runner-archcanvas
    concurrency:
      group: build-web
      cancel-in-progress: ${{ github.event_name != 'repository_dispatch' }}
    steps:
      - uses: actions/checkout@v4

      - name: Export registry env
        run: |
          echo "::add-mask::$PRIVATE_REGISTRY"
          echo "PRIVATE_REGISTRY=$PRIVATE_REGISTRY" >> "$GITHUB_ENV"
          echo "::add-mask::$REGISTRY_MIRROR"
          echo "REGISTRY_MIRROR=$REGISTRY_MIRROR" >> "$GITHUB_ENV"
          echo "::add-mask::$PRIVATE_REGISTRY_USER"
          echo "PRIVATE_REGISTRY_USER=$PRIVATE_REGISTRY_USER" >> "$GITHUB_ENV"
          echo "::add-mask::$PRIVATE_REGISTRY_TOKEN"
          echo "PRIVATE_REGISTRY_TOKEN=$PRIVATE_REGISTRY_TOKEN" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["${{ env.REGISTRY_MIRROR }}"]
            [registry."${{ env.REGISTRY_MIRROR }}"]
              http = true
            [registry."${{ env.PRIVATE_REGISTRY }}"]
              http = true

      - name: Authenticate to the private registry
        run: |
          AUTH=$(printf '%s:%s' "$PRIVATE_REGISTRY_USER" "$PRIVATE_REGISTRY_TOKEN" | base64 | tr -d '\n')
          echo "::add-mask::$AUTH"
          mkdir -p "$HOME/.docker"
          printf '{"auths":{"%s":{"auth":"%s"}}}\n' "$PRIVATE_REGISTRY" "$AUTH" > "$HOME/.docker/config.json"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.PRIVATE_REGISTRY }}/archcanvas/web:latest
            ${{ env.PRIVATE_REGISTRY }}/archcanvas/web:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.PRIVATE_REGISTRY }}/archcanvas/web:buildcache
          cache-to: type=registry,ref=${{ env.PRIVATE_REGISTRY }}/archcanvas/web:buildcache,mode=max
