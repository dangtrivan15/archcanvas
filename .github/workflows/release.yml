name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate new version
        id: bump
        env:
          BUMP_TYPE: ${{ inputs.bump }}
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          CURRENT=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP_TYPE" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping $BUMP_TYPE: ${CURRENT} → ${VERSION}"

  build:
    needs: resolve-version
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: macos-14
            rust-target: aarch64-apple-darwin
          - runner: macos-13
            rust-target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Set version
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.env.VERSION;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.version = process.env.VERSION;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "

      - name: Build frontend
        run: npm run build

      - name: Build sidecar
        env:
          RUST_TARGET: ${{ matrix.rust-target }}
        run: bun build --compile src-web/bridge/index.ts --outfile "src-tauri/binaries/archcanvas-bridge-${RUST_TARGET}"

      - name: Build Tauri app
        env:
          RUST_TARGET: ${{ matrix.rust-target }}
        run: npx tauri build --target "$RUST_TARGET" --bundles dmg --config '{"build":{"beforeBuildCommand":""}}'

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.rust-target }}
          path: src-tauri/target/${{ matrix.rust-target }}/release/bundle/dmg/*.dmg

  release:
    if: github.repository == 'dangtrivan15/archcanvas'
    needs: [resolve-version, build]
    runs-on: arc-runner-archcanvas
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir release
          mv artifacts/dmg-aarch64-apple-darwin/*.dmg release/ArchCanvas-aarch64.dmg
          mv artifacts/dmg-x86_64-apple-darwin/*.dmg release/ArchCanvas-x64.dmg

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve-version.outputs.tag }}
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "ArchCanvas $VERSION" \
            --generate-notes \
            release/ArchCanvas-aarch64.dmg \
            release/ArchCanvas-x64.dmg
