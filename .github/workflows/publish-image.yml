name: Publish Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['src-landing/**', 'landing.Dockerfile', 'vite.config.landing.ts']

concurrency:
  group: publish-image
  cancel-in-progress: true

jobs:
  build-and-push:
    if: github.repository == 'dangtrivan15/archcanvas'
    runs-on: arc-runner-archcanvas
    steps:
      - uses: actions/checkout@v4

      - name: Export registry env
        run: |
          echo "::add-mask::$PRIVATE_REGISTRY"
          echo "PRIVATE_REGISTRY=$PRIVATE_REGISTRY" >> "$GITHUB_ENV"
          echo "::add-mask::$DOCKER_HUB_MIRROR"
          echo "DOCKER_HUB_MIRROR=$DOCKER_HUB_MIRROR" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["${{ env.DOCKER_HUB_MIRROR }}"]
            [registry."${{ env.DOCKER_HUB_MIRROR }}"]
              http = true
            [registry."${{ env.PRIVATE_REGISTRY }}"]
              http = true

      - name: Build and push landing image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: landing.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.PRIVATE_REGISTRY }}/archcanvas-landing:latest
            ${{ env.PRIVATE_REGISTRY }}/archcanvas-landing:${{ github.sha }}