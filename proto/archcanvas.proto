syntax = "proto3";

package archcanvas;

// Top-level container for .archc files
message ArchCanvasFile {
  FileHeader header = 1;
  Architecture architecture = 2;
  CanvasState canvas_state = 3;
  AIState ai_state = 4;
  UndoHistory undo_history = 5;
}

message FileHeader {
  uint32 format_version = 1;
  string tool_version = 2;
  uint64 created_at_ms = 3;
  uint64 updated_at_ms = 4;
  bytes checksum_sha256 = 5;
}

message Architecture {
  string name = 1;
  string description = 2;
  repeated string owners = 3;
  repeated Node nodes = 4;
  repeated Edge edges = 5;
}

message Node {
  string id = 1;
  string type = 2;
  string display_name = 3;
  map<string, Value> args = 4;
  repeated CodeRef code_refs = 5;
  repeated Note notes = 6;
  map<string, Value> properties = 7;
  Position position = 8;
  repeated Node children = 9;
  string ref_source = 10;
}

message Edge {
  string id = 1;
  string from_node = 2;
  string to_node = 3;
  string from_port = 4;
  string to_port = 5;
  EdgeType type = 6;
  string label = 7;
  map<string, Value> properties = 8;
  repeated Note notes = 9;

  enum EdgeType {
    SYNC = 0;
    ASYNC = 1;
    DATA_FLOW = 2;
  }
}

message Note {
  string id = 1;
  string author = 2;
  uint64 timestamp_ms = 3;
  string content = 4;
  repeated string tags = 5;
  NoteStatus status = 6;
  string suggestion_type = 7;

  enum NoteStatus {
    NONE = 0;
    PENDING = 1;
    ACCEPTED = 2;
    DISMISSED = 3;
  }
}

message CodeRef {
  string path = 1;
  CodeRefRole role = 2;

  enum CodeRefRole {
    SOURCE = 0;
    API_SPEC = 1;
    SCHEMA = 2;
    DEPLOYMENT = 3;
    CONFIG = 4;
    TEST = 5;
  }
}

message Position {
  double x = 1;
  double y = 2;
  double width = 3;
  double height = 4;
  string color = 5;
}

message CanvasState {
  double viewport_x = 1;
  double viewport_y = 2;
  double viewport_zoom = 3;
  repeated string selected_node_ids = 4;
  repeated string navigation_path = 5;
  PanelLayout panel_layout = 6;
}

message PanelLayout {
  bool right_panel_open = 1;
  string right_panel_tab = 2;
  double right_panel_width = 3;
}

message AIState {
  repeated AIConversation conversations = 1;
}

message AIConversation {
  string id = 1;
  string scoped_to_node_id = 2;
  repeated AIMessage messages = 3;
  uint64 created_at_ms = 4;
}

message AIMessage {
  string id = 1;
  string role = 2;
  string content = 3;
  uint64 timestamp_ms = 4;
  repeated AISuggestion suggestions = 5;
}

message AISuggestion {
  string id = 1;
  string target_node_id = 2;
  string target_edge_id = 3;
  string suggestion_type = 4;
  string content = 5;
  Note.NoteStatus status = 6;
}

message UndoHistory {
  repeated UndoEntry entries = 1;
  int32 current_index = 2;
  int32 max_entries = 3;
}

message UndoEntry {
  string description = 1;
  uint64 timestamp_ms = 2;
  bytes architecture_snapshot = 3;
}

message Value {
  oneof kind {
    string string_value = 1;
    double number_value = 2;
    bool bool_value = 3;
    StringList string_list_value = 4;
  }
}

message StringList {
  repeated string values = 1;
}
