kind: NodeDef
apiVersion: v1
metadata:
  name: feature-store
  namespace: data
  version: "1.0.0"
  displayName: Feature Store
  description: An ML feature storage and serving system for managing, storing, and serving features for machine learning models.
  icon: Layers
  tags:
    - data
    - ml
    - features
    - machine-learning
  shape: cylinder
spec:
  args:
    - name: engine
      type: enum
      description: Feature store engine
      options:
        - Feast
        - Tecton
        - Hopsworks
        - SageMaker Feature Store
        - Custom
      default: Feast
    - name: onlineStore
      type: boolean
      description: Enable online (low-latency) feature serving
      default: true
    - name: offlineStore
      type: boolean
      description: Enable offline (batch) feature storage
      default: true
    - name: materializationSchedule
      type: string
      description: Schedule for materializing features from offline to online store (cron expression)
      default: "@hourly"
  ports:
    - name: feature-write
      direction: inbound
      protocol:
        - HTTP
        - gRPC
      description: Write/ingest feature values
    - name: feature-serve
      direction: outbound
      protocol:
        - HTTP
        - gRPC
      description: Serve feature values for inference
  variants:
    - name: Feast
      args:
        engine: Feast
        onlineStore: true
        offlineStore: true
        materializationSchedule: "@hourly"
    - name: Tecton
      args:
        engine: Tecton
        onlineStore: true
        offlineStore: true
        materializationSchedule: "@hourly"
    - name: Hopsworks
      args:
        engine: Hopsworks
        onlineStore: true
        offlineStore: true
        materializationSchedule: "@daily"
    - name: SageMaker Feature Store
      args:
        engine: SageMaker Feature Store
        onlineStore: true
        offlineStore: true
        materializationSchedule: "@hourly"
  ai:
    context: "This is a feature store node for ML feature management. Consider feature freshness, online vs offline serving trade-offs, feature versioning, and data consistency."
    reviewHints:
      - Verify feature freshness meets model requirements
      - Check online store latency for serving use cases
      - Consider feature versioning and backward compatibility
      - Plan materialization schedule for data consistency
