kind: NodeDef
apiVersion: v1
metadata:
  name: function
  namespace: compute
  version: "1.0.0"
  displayName: Function
  description: A serverless function or lambda that executes in response to events.
  icon: Zap
  tags:
    - compute
    - serverless
    - lambda
  shape: rectangle
spec:
  args:
    - name: runtime
      type: enum
      description: Execution runtime
      options:
        - Node.js 20
        - Python 3.12
        - Go 1.22
        - Java 21
        - Rust
      default: Node.js 20
    - name: memory
      type: number
      description: Memory allocation in MB
      default: 256
    - name: timeout
      type: duration
      description: Maximum execution time
      default: 30s
    - name: trigger
      type: enum
      description: Invocation trigger type
      options:
        - HTTP
        - Schedule
        - Event
        - Queue
      default: HTTP
  ports:
    - name: trigger-in
      direction: inbound
      protocol:
        - HTTP
        - Event
      description: Trigger input
    - name: call-out
      direction: outbound
      protocol:
        - HTTP
        - SDK
      description: Outbound calls to other services
  ai:
    context: "This is a serverless function. Consider cold start latency, execution time limits, and statelessness."
    reviewHints:
      - Check for cold start optimization
      - Verify timeout is appropriate
      - Ensure function is stateless
