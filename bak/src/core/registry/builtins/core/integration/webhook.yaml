kind: NodeDef
apiVersion: v1
metadata:
  name: webhook
  namespace: integration
  version: "1.0.0"
  displayName: Webhook
  description: An inbound or outbound webhook endpoint for event-driven integrations. Supports secret signing and configurable retry policies.
  icon: Webhook
  tags:
    - integration
    - webhook
    - event-driven
    - http
  shape: parallelogram
spec:
  args:
    - name: direction
      type: enum
      required: true
      description: Whether this webhook receives (inbound) or sends (outbound) events
      options:
        - inbound
        - outbound
      default: inbound
    - name: url
      type: string
      required: true
      description: The webhook endpoint URL
      default: "https://example.com/webhook"
    - name: secretSigning
      type: boolean
      required: false
      description: Whether payloads are signed with a shared secret (e.g. HMAC-SHA256)
      default: true
    - name: retryPolicy
      type: enum
      required: true
      description: Retry strategy for failed webhook deliveries
      options:
        - none
        - fixed
        - exponential
      default: exponential
    - name: maxRetries
      type: number
      required: false
      description: Maximum number of retry attempts for failed deliveries
      default: 5
  ports:
    - name: trigger
      direction: inbound
      protocol:
        - HTTPS
        - HTTP
      description: Incoming webhook trigger / event reception
    - name: payload
      direction: outbound
      protocol:
        - HTTPS
        - HTTP
      description: Outgoing webhook payload delivery
  children: []
  ai:
    context: "This is a webhook integration point. Consider payload validation, secret signing for authenticity, idempotency keys, retry policies with backoff, and timeout handling."
    reviewHints:
      - Verify webhook secret signing is enabled for security
      - Check retry policy and max retries are appropriate for the use case
      - Ensure idempotency handling for duplicate deliveries
      - Review payload size limits and timeout configuration
variants:
  - name: Inbound Webhook
    description: Receives events from external services
    args:
      direction: inbound
      url: "https://api.myapp.com/webhooks/receive"
      secretSigning: true
      retryPolicy: none
      maxRetries: 0
  - name: Outbound Webhook
    description: Sends events to external services
    args:
      direction: outbound
      url: "https://partner.example.com/webhook"
      secretSigning: true
      retryPolicy: exponential
      maxRetries: 5
  - name: GitHub Webhook
    description: Receives GitHub repository events
    args:
      direction: inbound
      url: "https://api.myapp.com/webhooks/github"
      secretSigning: true
      retryPolicy: none
      maxRetries: 0
  - name: Stripe Webhook
    description: Receives Stripe payment events
    args:
      direction: inbound
      url: "https://api.myapp.com/webhooks/stripe"
      secretSigning: true
      retryPolicy: none
      maxRetries: 0
