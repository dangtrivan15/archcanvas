kind: NodeDef
apiVersion: v1
metadata:
  name: mcp-server
  namespace: integration
  version: "1.0.0"
  displayName: MCP Server
  description: A Model Context Protocol (MCP) tool server that exposes tools and resources to AI agents. Supports stdio, SSE, and streamable HTTP transports.
  icon: Puzzle
  tags:
    - integration
    - mcp
    - ai
    - tools
    - model-context-protocol
  shape: hexagon
spec:
  args:
    - name: transport
      type: enum
      required: true
      description: The transport protocol used for MCP communication
      options:
        - stdio
        - SSE
        - streamable HTTP
      default: stdio
    - name: toolsCount
      type: number
      required: false
      description: Number of tools exposed by this MCP server
      default: 5
    - name: resourcesCount
      type: number
      required: false
      description: Number of resources exposed by this MCP server
      default: 3
    - name: auth
      type: enum
      required: true
      description: Authentication method for connecting clients
      options:
        - none
        - Bearer
        - OAuth2
      default: none
  ports:
    - name: mcp-request
      direction: inbound
      protocol:
        - MCP
        - JSON-RPC
      description: Incoming MCP requests from AI agents or clients
    - name: tool-result
      direction: outbound
      protocol:
        - MCP
        - JSON-RPC
      description: Outgoing tool execution results
    - name: resource-content
      direction: outbound
      protocol:
        - MCP
        - JSON-RPC
      description: Outgoing resource content responses
  children: []
  ai:
    context: "This is an MCP server that exposes tools and resources to AI agents via the Model Context Protocol. Consider transport selection (stdio for local, SSE/HTTP for remote), authentication requirements, tool timeout handling, and resource caching strategies."
    reviewHints:
      - Verify transport matches deployment context (stdio for CLI, SSE/HTTP for web)
      - Check authentication is configured for remote transports
      - Ensure tool count and resource count match actual implementation
      - Review error handling for tool execution failures
variants:
  - name: Local stdio MCP Server
    description: A local MCP server communicating via stdio (e.g., for Claude Code)
    args:
      transport: stdio
      toolsCount: 10
      resourcesCount: 5
      auth: none
  - name: Remote SSE MCP Server
    description: A remote MCP server using Server-Sent Events for real-time communication
    args:
      transport: SSE
      toolsCount: 8
      resourcesCount: 3
      auth: Bearer
  - name: HTTP MCP Server
    description: A stateless MCP server using streamable HTTP transport
    args:
      transport: streamable HTTP
      toolsCount: 5
      resourcesCount: 2
      auth: OAuth2
  - name: Database Tools MCP Server
    description: An MCP server exposing database query and schema tools
    args:
      transport: stdio
      toolsCount: 6
      resourcesCount: 10
      auth: none
