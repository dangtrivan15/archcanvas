kind: NodeDef
apiVersion: v1
metadata:
  name: llm-monitor
  namespace: observability
  version: "1.0.0"
  displayName: LLM Monitor
  description: An LLM-specific observability platform for tracking token usage, latency, hallucinations, and evaluation metrics across AI model interactions.
  icon: Activity
  tags:
    - observability
    - llm
    - ai
    - monitoring
  shape: document
spec:
  args:
    - name: platform
      type: enum
      description: LLM observability platform
      options:
        - LangSmith
        - Langfuse
        - Helicone
        - Arize
        - Braintrust
        - Custom
      default: LangSmith
    - name: trackTokens
      type: boolean
      description: Track token usage and costs
      default: true
    - name: trackLatency
      type: boolean
      description: Track response latency metrics
      default: true
    - name: trackHallucinations
      type: boolean
      description: Track and detect hallucinations
      default: false
    - name: evaluationEnabled
      type: boolean
      description: Enable evaluation and scoring pipelines
      default: false
  ports:
    - name: llm-traces
      direction: inbound
      protocol:
        - OTLP
        - HTTP
        - SDK
      description: LLM trace and span ingestion
  ai:
    context: "This is an LLM observability platform. Consider token cost tracking, latency percentiles, hallucination detection strategies, prompt versioning, and evaluation dataset management."
    reviewHints:
      - Verify token tracking covers both input and output tokens
      - Check latency tracking includes p50, p95, p99 percentiles
      - Consider cost attribution per model and per feature
      - Evaluate hallucination detection methodology
