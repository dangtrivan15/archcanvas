kind: NodeDef
apiVersion: v1
metadata:
  name: message-queue
  namespace: messaging
  version: "1.0.0"
  displayName: Message Queue
  description: A message queue for asynchronous communication between services.
  icon: Inbox
  tags:
    - messaging
    - async
    - queue
  shape: parallelogram
spec:
  args:
    - name: broker
      type: enum
      description: Message broker
      options:
        - RabbitMQ
        - SQS
        - ActiveMQ
        - ZeroMQ
      default: RabbitMQ
    - name: durable
      type: boolean
      description: Messages survive broker restart
      default: true
    - name: maxRetries
      type: number
      description: Max delivery retries before DLQ
      default: 3
    - name: dlqEnabled
      type: boolean
      description: Dead letter queue enabled
      default: true
  ports:
    - name: publish-in
      direction: inbound
      protocol:
        - AMQP
        - HTTP
      description: Message publishing
    - name: consume-out
      direction: outbound
      protocol:
        - AMQP
      description: Message consumption
  ai:
    context: "This is a message queue. Consider message ordering, delivery guarantees, and dead letter queue handling."
    reviewHints:
      - Verify message ordering requirements
      - Check DLQ monitoring
      - Consider message schema evolution
