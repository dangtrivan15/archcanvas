kind: NodeDef
apiVersion: v1
metadata:
  name: notification
  namespace: messaging
  version: "1.0.0"
  displayName: Notification
  description: A push notification hub for delivering alerts across multiple channels and providers.
  icon: Bell
  tags:
    - messaging
    - notification
    - push
    - alerts
  shape: stadium
spec:
  args:
    - name: provider
      type: enum
      description: Notification provider
      options:
        - FCM
        - APNs
        - SNS
        - OneSignal
        - Custom
      default: FCM
    - name: channels
      type: enum
      description: Notification channels
      options:
        - push
        - email
        - SMS
        - in-app
      multi: true
      default: push
    - name: batching
      type: boolean
      description: Enable notification batching
      default: false
    - name: priority
      type: enum
      description: Default notification priority
      options:
        - high
        - normal
        - low
      default: normal
  ports:
    - name: send-notification
      direction: inbound
      protocol:
        - HTTP
        - Event
      description: Incoming notification requests
    - name: delivery-status
      direction: outbound
      protocol:
        - Event
      description: Delivery status callbacks
  ai:
    context: "This is a push notification hub. Consider delivery guarantees, rate limiting, device token management, and notification priority/channel routing."
    reviewHints:
      - Check notification payload size limits
      - Verify device token refresh handling
      - Consider notification batching for high-volume scenarios
