kind: NodeDef
apiVersion: v1
metadata:
  name: guardrails
  namespace: ai
  version: "1.0.0"
  displayName: Guardrails
  description: AI safety and validation layer for inputs and outputs. Represents guardrail frameworks like Guardrails AI, NeMo Guardrails, LLM-Guard, or custom filters that validate, sanitize, and enforce policies on LLM interactions.
  icon: Shield
  tags:
    - ai
    - safety
    - validation
    - guardrails
    - filtering
  shape: hexagon
spec:
  args:
    - name: framework
      type: enum
      required: true
      description: The guardrails framework or implementation used
      default: "Guardrails AI"
      options:
        - "Guardrails AI"
        - "NeMo Guardrails"
        - "LLM-Guard"
        - "Custom"
    - name: inputValidation
      type: boolean
      required: false
      description: Whether to validate and sanitize inputs before sending to LLM
      default: true
    - name: outputFiltering
      type: boolean
      required: false
      description: Whether to filter and validate LLM outputs before returning
      default: true
    - name: piiDetection
      type: boolean
      required: false
      description: Whether to detect and redact personally identifiable information
      default: true
    - name: toxicityCheck
      type: boolean
      required: false
      description: Whether to check for and block toxic or harmful content
      default: true
    - name: tokenLimit
      type: number
      required: false
      description: Maximum token budget per request for cost control
      default: 4096
  ports:
    - name: raw-input
      direction: inbound
      protocol:
        - HTTP
        - gRPC
      description: Raw user input or prompt to be validated and sanitized
    - name: raw-output
      direction: inbound
      protocol:
        - HTTP
        - gRPC
      description: Raw LLM output to be filtered and validated
    - name: validated-input
      direction: outbound
      protocol:
        - HTTP
        - gRPC
      description: Validated and sanitized input ready for LLM processing
    - name: filtered-output
      direction: outbound
      protocol:
        - HTTP
        - gRPC
      description: Filtered and validated output safe for end users
  children: []
  ai:
    context: "This is an AI guardrails/safety layer. Consider input validation rules, output filtering policies, PII detection accuracy, toxicity thresholds, prompt injection prevention, jailbreak detection, cost controls, and audit logging of blocked content."
    reviewHints:
      - Verify PII detection covers all required data types (SSN, email, phone, etc.)
      - Check toxicity thresholds are appropriately configured
      - Consider prompt injection and jailbreak attack prevention
      - Review token limit enforcement and cost control measures
      - Ensure blocked content is logged for audit purposes
      - Consider fallback behavior when guardrails reject content
variants:
  - name: Guardrails AI
    description: Guardrails AI framework with schema-based validation
    args:
      framework: "Guardrails AI"
      inputValidation: true
      outputFiltering: true
      piiDetection: true
      toxicityCheck: false
      tokenLimit: 4096
  - name: NeMo Guardrails
    description: NVIDIA NeMo Guardrails with dialog flow control
    args:
      framework: "NeMo Guardrails"
      inputValidation: true
      outputFiltering: true
      piiDetection: true
      toxicityCheck: true
      tokenLimit: 8192
  - name: LLM-Guard
    description: LLM-Guard open-source safety toolkit
    args:
      framework: "LLM-Guard"
      inputValidation: true
      outputFiltering: true
      piiDetection: true
      toxicityCheck: true
      tokenLimit: 4096
  - name: Custom Guardrails
    description: Custom validation and filtering implementation
    args:
      framework: "Custom"
      inputValidation: true
      outputFiltering: true
      piiDetection: false
      toxicityCheck: false
      tokenLimit: 2048
