kind: NodeDef
apiVersion: v1
metadata:
  name: rag-pipeline
  namespace: ai
  version: "1.0.0"
  displayName: RAG Pipeline
  description: A Retrieval-Augmented Generation orchestrator that ties together embedding, retrieval, and generation stages. Manages document chunking, vector search, and prompt augmentation.
  icon: GitMerge
  tags:
    - ai
    - rag
    - retrieval
    - generation
  shape: parallelogram
spec:
  args:
    - name: chunkSize
      type: number
      required: true
      description: Number of tokens per document chunk for embedding
      default: 512
    - name: chunkOverlap
      type: number
      required: false
      description: Number of overlapping tokens between consecutive chunks
      default: 64
    - name: topK
      type: number
      required: true
      description: Number of top matching chunks to retrieve
      default: 5
    - name: reranker
      type: enum
      required: false
      description: Reranking strategy applied after initial retrieval
      default: "none"
      options:
        - "none"
        - "Cohere"
        - "cross-encoder"
        - "Custom"
    - name: retrievalStrategy
      type: enum
      required: true
      description: Vector retrieval strategy used during the search phase
      default: "similarity"
      options:
        - "similarity"
        - "MMR"
        - "hybrid"
  ports:
    - name: query
      direction: inbound
      protocol:
        - HTTP
      description: Inbound user query to be augmented with retrieved context
    - name: augmented-prompt
      direction: outbound
      protocol:
        - HTTP
      description: Outbound prompt enriched with retrieved document context
    - name: source-docs
      direction: outbound
      protocol:
        - HTTP
      description: Outbound retrieved source documents and metadata
  children: []
  ai:
    context: "This is a RAG pipeline orchestrator. Consider chunk size vs context window limits, embedding model compatibility, retrieval latency, reranking quality-latency tradeoffs, citation tracking, and hallucination mitigation through grounding."
    reviewHints:
      - Verify chunk size fits within embedding model token limits
      - Check overlap prevents loss of context at chunk boundaries
      - Consider hybrid retrieval for better recall on diverse queries
      - Ensure source document attribution and citation tracking
      - Review reranking latency impact on end-to-end response time
      - Consider caching frequently retrieved chunks
variants:
  - name: Standard RAG
    description: Basic similarity-based RAG pipeline with default settings
    args:
      chunkSize: 512
      chunkOverlap: 64
      topK: 5
      reranker: "none"
      retrievalStrategy: "similarity"
  - name: Advanced RAG
    description: RAG pipeline with MMR retrieval and cross-encoder reranking
    args:
      chunkSize: 256
      chunkOverlap: 32
      topK: 10
      reranker: "cross-encoder"
      retrievalStrategy: "MMR"
  - name: Hybrid RAG
    description: Hybrid retrieval with Cohere reranking for production use
    args:
      chunkSize: 512
      chunkOverlap: 64
      topK: 8
      reranker: "Cohere"
      retrievalStrategy: "hybrid"
