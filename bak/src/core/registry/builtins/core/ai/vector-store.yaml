kind: NodeDef
apiVersion: v1
metadata:
  name: vector-store
  namespace: ai
  version: "1.0.0"
  displayName: Vector Store
  description: A vector database for similarity search and embedding storage. Represents vector databases such as Pinecone, Weaviate, Qdrant, Chroma, pgvector, or Milvus.
  icon: Database
  tags:
    - ai
    - vector
    - embeddings
    - similarity-search
  shape: cylinder
spec:
  args:
    - name: engine
      type: enum
      required: true
      description: The vector database engine
      default: "Pinecone"
      options:
        - "Pinecone"
        - "Weaviate"
        - "Qdrant"
        - "Chroma"
        - "pgvector"
        - "Milvus"
    - name: dimensions
      type: number
      required: true
      description: The number of dimensions for stored vectors (e.g. 1536 for OpenAI ada-002)
      default: 1536
    - name: distanceMetric
      type: enum
      required: true
      description: The distance metric used for similarity comparison
      default: "cosine"
      options:
        - "cosine"
        - "euclidean"
        - "dot product"
    - name: indexType
      type: enum
      required: false
      description: The index algorithm for approximate nearest neighbor search
      default: "HNSW"
      options:
        - "HNSW"
        - "IVF"
        - "flat"
  ports:
    - name: upsert
      direction: inbound
      protocol:
        - HTTP
        - gRPC
      description: Inbound requests to insert or update vectors with metadata
    - name: query
      direction: inbound
      protocol:
        - HTTP
        - gRPC
      description: Inbound similarity search queries
    - name: results
      direction: outbound
      protocol:
        - HTTP
        - gRPC
      description: Outbound similarity search results with scores and metadata
  children: []
  ai:
    context: "This is a vector store for similarity search. Consider embedding dimensions alignment with upstream models, index tuning for query latency vs recall tradeoffs, metadata filtering strategies, batch upsert performance, and data partitioning for multi-tenant use cases."
    reviewHints:
      - Verify embedding dimensions match the upstream model output
      - Check index configuration for query latency requirements
      - Consider metadata filtering for efficient hybrid search
      - Review batch upsert strategies for large data ingestion
      - Ensure backup and disaster recovery for vector data
      - Consider multi-tenancy isolation if serving multiple applications
variants:
  - name: Pinecone
    description: Pinecone managed vector database
    args:
      engine: "Pinecone"
      dimensions: 1536
      distanceMetric: "cosine"
      indexType: "HNSW"
  - name: Weaviate
    description: Weaviate open-source vector database
    args:
      engine: "Weaviate"
      dimensions: 1536
      distanceMetric: "cosine"
      indexType: "HNSW"
  - name: Qdrant
    description: Qdrant vector similarity engine
    args:
      engine: "Qdrant"
      dimensions: 1536
      distanceMetric: "cosine"
      indexType: "HNSW"
  - name: Chroma
    description: Chroma open-source embedding database
    args:
      engine: "Chroma"
      dimensions: 1536
      distanceMetric: "cosine"
      indexType: "HNSW"
  - name: pgvector
    description: PostgreSQL pgvector extension
    args:
      engine: "pgvector"
      dimensions: 1536
      distanceMetric: "cosine"
      indexType: "IVF"
  - name: Milvus
    description: Milvus distributed vector database
    args:
      engine: "Milvus"
      dimensions: 1536
      distanceMetric: "cosine"
      indexType: "HNSW"
