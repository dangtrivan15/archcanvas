kind: NodeDef
apiVersion: v1
metadata:
  name: agent
  namespace: ai
  version: "1.0.0"
  displayName: AI Agent
  description: An autonomous AI agent with tool use capabilities. Represents agents built with frameworks like LangChain, CrewAI, AutoGen, Claude Agent SDK, or custom implementations.
  icon: Bot
  tags:
    - ai
    - agent
    - autonomous
    - tool-use
  shape: hexagon
spec:
  args:
    - name: framework
      type: enum
      required: true
      description: The agent framework or SDK used
      default: "LangChain"
      options:
        - "LangChain"
        - "CrewAI"
        - "AutoGen"
        - "Claude Agent SDK"
        - "Custom"
    - name: maxIterations
      type: number
      required: false
      description: Maximum number of reasoning/action iterations before stopping
      default: 10
    - name: toolsCount
      type: number
      required: false
      description: Number of tools available to the agent
      default: 5
    - name: memoryType
      type: enum
      required: false
      description: Type of memory used for conversation and context retention
      default: "buffer"
      options:
        - "buffer"
        - "summary"
        - "vector"
        - "none"
  ports:
    - name: task-request
      direction: inbound
      protocol:
        - HTTP
        - gRPC
      description: Inbound task or prompt requests for the agent to process
    - name: tool-call
      direction: outbound
      protocol:
        - HTTP
        - gRPC
      description: Outbound calls to external tools, APIs, or services
    - name: task-result
      direction: outbound
      protocol:
        - HTTP
        - gRPC
      description: Outbound final results or responses from the agent
  children: []
  ai:
    context: "This is an autonomous AI agent. Consider safety guardrails, iteration limits, tool permission scoping, cost controls, human-in-the-loop checkpoints, observability of agent reasoning chains, and graceful failure handling."
    reviewHints:
      - Verify iteration limits to prevent runaway loops
      - Check tool permission scoping and sandboxing
      - Consider human-in-the-loop approval for high-risk actions
      - Review cost controls and token budget management
      - Ensure observability of agent reasoning and tool calls
      - Consider timeout and circuit breaker patterns
variants:
  - name: LangChain Agent
    description: LangChain-based autonomous agent with tool use
    args:
      framework: "LangChain"
      maxIterations: 10
      toolsCount: 5
      memoryType: "buffer"
  - name: CrewAI Agent
    description: CrewAI multi-agent crew member
    args:
      framework: "CrewAI"
      maxIterations: 15
      toolsCount: 8
      memoryType: "summary"
  - name: Claude Agent
    description: Claude Agent SDK based autonomous agent
    args:
      framework: "Claude Agent SDK"
      maxIterations: 20
      toolsCount: 10
      memoryType: "buffer"
