kind: NodeDef
apiVersion: v1
metadata:
  name: prompt-registry
  namespace: ai
  version: "1.0.0"
  displayName: Prompt Registry
  description: A versioned prompt/template store for managing, versioning, and serving prompt templates. Supports platforms like LangSmith Hub, Promptfoo, Pezzo, or custom registries.
  icon: FileText
  tags:
    - ai
    - prompts
    - templates
    - registry
  shape: rectangle
spec:
  args:
    - name: versionStrategy
      type: enum
      required: true
      description: How prompt versions are tracked and managed
      default: "semantic"
      options:
        - "semantic"
        - "incremental"
        - "git-hash"
    - name: templateFormat
      type: enum
      required: true
      description: The templating language used for prompt interpolation
      default: "mustache"
      options:
        - "mustache"
        - "jinja"
        - "f-string"
        - "handlebars"
    - name: abTesting
      type: boolean
      required: false
      description: Whether A/B testing of prompt variants is enabled
      default: false
  ports:
    - name: prompt-fetch
      direction: inbound
      protocol:
        - HTTP
        - gRPC
      description: Inbound requests to fetch a prompt template by name and version
    - name: rendered-prompt
      direction: outbound
      protocol:
        - HTTP
        - gRPC
      description: Outbound rendered/interpolated prompt text ready for LLM consumption
  children: []
  ai:
    context: "This is a prompt registry/template store. Consider version control for prompts, rollback capabilities, template validation, variable injection safety, A/B testing for prompt optimization, and integration with LLM providers."
    reviewHints:
      - Verify prompt versioning and rollback mechanisms
      - Check template variable validation and injection safety
      - Consider A/B testing infrastructure for prompt optimization
      - Ensure audit logging for prompt changes
      - Review caching strategy for frequently used templates
variants:
  - name: LangSmith Hub
    description: LangSmith Hub prompt registry with semantic versioning
    args:
      versionStrategy: "semantic"
      templateFormat: "mustache"
      abTesting: false
  - name: Promptfoo
    description: Promptfoo prompt testing and management registry
    args:
      versionStrategy: "incremental"
      templateFormat: "handlebars"
      abTesting: true
  - name: Pezzo
    description: Pezzo AI prompt management platform
    args:
      versionStrategy: "semantic"
      templateFormat: "jinja"
      abTesting: true
  - name: Custom Registry
    description: Custom prompt registry with git-based versioning
    args:
      versionStrategy: "git-hash"
      templateFormat: "f-string"
      abTesting: false
