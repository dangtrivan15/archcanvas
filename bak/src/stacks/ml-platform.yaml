kind: StackTemplate
apiVersion: v1
metadata:
  name: ml-platform
  displayName: ML Platform
  description: End-to-end ML platform from model training to serving. Includes Triton model serving with A100 GPUs, Sentence Transformers embeddings, Qdrant vector store, Guardrails AI safety layer, Feast feature store, PostgreSQL database, S3 object storage, Airflow ETL pipeline, Prometheus monitoring, and Cloud Scheduler cron job.
  icon: Brain
  tags:
    - ml
    - ai
    - platform
    - model-serving
    - mlops

nodes:
  - id: model-serving
    type: ai/model-serving
    displayName: Triton Model Serving
    args:
      framework: Triton
      gpuType: A100
      batchSize: 16
      autoscaling: true
      minReplicas: 2
      maxReplicas: 8
    position:
      x: 500
      y: 50
      width: 200
      height: 100

  - id: embedding-service
    type: ai/embedding-service
    displayName: Sentence Transformers
    args:
      provider: Sentence Transformers
      model: all-MiniLM-L6-v2
      dimensions: 384
      batchSize: 256
    position:
      x: 500
      y: 200
      width: 200
      height: 100

  - id: vector-store
    type: ai/vector-store
    displayName: Qdrant Vector Store
    args:
      engine: Qdrant
      dimensions: 384
      distanceMetric: cosine
      indexType: HNSW
    position:
      x: 800
      y: 200
      width: 200
      height: 100

  - id: guardrails
    type: ai/guardrails
    displayName: Guardrails AI
    args:
      framework: Guardrails AI
      inputValidation: true
      outputFiltering: true
      piiDetection: true
      toxicityCheck: false
      tokenLimit: 4096
    position:
      x: 800
      y: 50
      width: 200
      height: 100

  - id: feature-store
    type: data/feature-store
    displayName: Feast Feature Store
    args:
      engine: Feast
      onlineStore: true
      offlineStore: true
      materializationSchedule: "@hourly"
    position:
      x: 200
      y: 50
      width: 200
      height: 100

  - id: database
    type: data/database
    displayName: PostgreSQL
    args:
      engine: PostgreSQL
      version: "16"
      maxConnections: 200
    position:
      x: 200
      y: 200
      width: 200
      height: 100

  - id: object-storage
    type: data/object-storage
    displayName: S3 Storage
    args:
      provider: AWS S3
      versioning: true
      encryption: AES-256
    position:
      x: 200
      y: 350
      width: 200
      height: 100

  - id: etl-pipeline
    type: integration/etl-pipeline
    displayName: Airflow ETL
    args:
      engine: Airflow
      schedule: "@daily"
      source: source_db
      destination: data_warehouse
    position:
      x: 500
      y: 350
      width: 200
      height: 100

  - id: monitoring
    type: observability/monitoring
    displayName: Prometheus Monitoring
    args:
      platform: Prometheus/Grafana
      scrapeInterval: 15s
      alertChannels: slack,email
    position:
      x: 800
      y: 350
      width: 200
      height: 100

  - id: cron-scheduler
    type: compute/cron-job
    displayName: Cloud Scheduler
    args:
      schedule: "0 */6 * * *"
      timezone: UTC
      timeout: 1h
      retryOnFailure: true
      maxRetries: 3
    position:
      x: 50
      y: 350
      width: 200
      height: 100

edges:
  - fromNode: cron-scheduler
    toNode: etl-pipeline
    type: sync
    label: Trigger Pipeline

  - fromNode: etl-pipeline
    toNode: database
    type: data_flow
    label: Load Data

  - fromNode: etl-pipeline
    toNode: object-storage
    type: data_flow
    label: Store Artifacts

  - fromNode: feature-store
    toNode: database
    type: sync
    label: Read Features

  - fromNode: model-serving
    toNode: feature-store
    type: sync
    label: Fetch Features

  - fromNode: model-serving
    toNode: guardrails
    type: sync
    label: Validate I/O

  - fromNode: embedding-service
    toNode: vector-store
    type: data_flow
    label: Store Embeddings

  - fromNode: model-serving
    toNode: monitoring
    type: async
    label: Export Metrics
