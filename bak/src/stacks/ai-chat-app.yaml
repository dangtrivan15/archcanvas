kind: StackTemplate
apiVersion: v1
metadata:
  name: ai-chat-app
  displayName: AI Chat App
  description: RAG-powered assistant architecture with React frontend, TypeScript backend, Anthropic Claude LLM, OpenAI embeddings, Pinecone vector store, RAG pipeline, NeMo Guardrails, and Langfuse monitoring.
  icon: MessageSquare
  tags:
    - ai
    - rag
    - chatbot
    - llm

nodes:
  - id: web-app
    type: client/web-app
    displayName: Chat Frontend
    args:
      framework: React
      rendering: SPA
      hosting: Vercel
    position:
      x: 50
      y: 250
      width: 200
      height: 100

  - id: service
    type: compute/service
    displayName: Chat API Service
    args:
      language: TypeScript
      framework: Express
      replicas: 1
      healthCheck: /health
    position:
      x: 350
      y: 250
      width: 200
      height: 100

  - id: guardrails
    type: ai/guardrails
    displayName: NeMo Guardrails
    args:
      framework: NeMo Guardrails
      inputValidation: true
      outputFiltering: true
      piiDetection: false
      toxicityCheck: true
      tokenLimit: 4096
    position:
      x: 650
      y: 250
      width: 200
      height: 100

  - id: rag-pipeline
    type: ai/rag-pipeline
    displayName: RAG Pipeline
    args:
      chunkSize: 512
      chunkOverlap: 64
      topK: 5
      reranker: none
      retrievalStrategy: similarity
    position:
      x: 950
      y: 250
      width: 200
      height: 100

  - id: embedding-service
    type: ai/embedding-service
    displayName: OpenAI Embeddings
    args:
      provider: OpenAI
      model: text-embedding-3-small
      dimensions: 1536
      batchSize: 100
    position:
      x: 950
      y: 50
      width: 200
      height: 100

  - id: vector-store
    type: ai/vector-store
    displayName: Pinecone
    args:
      engine: Pinecone
      dimensions: 1536
      distanceMetric: cosine
      indexType: HNSW
    position:
      x: 1250
      y: 50
      width: 200
      height: 100

  - id: llm-provider
    type: ai/llm-provider
    displayName: Anthropic Claude
    args:
      provider: Anthropic
      model: claude-sonnet-4-20250514
      maxTokens: 4096
      temperature: 0.7
      streaming: true
    position:
      x: 1250
      y: 250
      width: 200
      height: 100

  - id: llm-monitor
    type: observability/llm-monitor
    displayName: Langfuse
    args:
      platform: Langfuse
      trackTokens: true
      trackLatency: true
      trackHallucinations: false
      evaluationEnabled: false
    position:
      x: 350
      y: 475
      width: 200
      height: 100

edges:
  - fromNode: web-app
    toNode: service
    type: sync
    label: Chat request

  - fromNode: service
    toNode: guardrails
    type: sync
    label: Validate input/output

  - fromNode: guardrails
    toNode: rag-pipeline
    type: data-flow
    label: Validated query

  - fromNode: rag-pipeline
    toNode: embedding-service
    type: sync
    label: Embed query

  - fromNode: rag-pipeline
    toNode: vector-store
    type: sync
    label: Retrieve context

  - fromNode: rag-pipeline
    toNode: llm-provider
    type: sync
    label: Generate response

  - fromNode: service
    toNode: llm-monitor
    type: async
    label: LLM traces
