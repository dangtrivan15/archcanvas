kind: StackTemplate
apiVersion: v1
metadata:
  name: saas-starter
  displayName: SaaS Starter
  description: A production-ready SaaS architecture with Next.js frontend, Nginx API gateway, Express backend, PostgreSQL, Redis, Auth0, observability, and Stripe billing.
  icon: Rocket
  tags:
    - saas
    - starter
    - fullstack
    - production

nodes:
  - id: web-app
    type: client/web-app
    displayName: Web App
    args:
      framework: Next.js
      rendering: SSR
      hosting: Vercel
    position:
      x: 50
      y: 200
      width: 200
      height: 100

  - id: api-gateway
    type: compute/api-gateway
    displayName: API Gateway
    args:
      provider: Nginx
      rateLimit: 1000
      authMethod: JWT
    position:
      x: 350
      y: 200
      width: 200
      height: 100

  - id: backend-service
    type: compute/service
    displayName: Backend Service
    args:
      language: TypeScript
      framework: Express
      protocol: REST
    position:
      x: 650
      y: 200
      width: 200
      height: 100

  - id: database
    type: data/database
    displayName: PostgreSQL
    args:
      engine: PostgreSQL
      version: "16"
      maxConnections: 100
    position:
      x: 650
      y: 400
      width: 200
      height: 100

  - id: cache
    type: data/cache
    displayName: Redis Cache
    args:
      engine: Redis
      maxMemory: 256mb
      evictionPolicy: allkeys-lru
    position:
      x: 950
      y: 400
      width: 200
      height: 100

  - id: auth-provider
    type: security/auth-provider
    displayName: Auth0
    args:
      provider: Auth0
      protocol: OIDC
      mfaEnabled: false
    position:
      x: 950
      y: 50
      width: 200
      height: 100

  - id: logging
    type: observability/logging
    displayName: Logging (Loki/Grafana)
    args:
      platform: Loki
      retentionDays: 30
      structured: true
    position:
      x: 950
      y: 200
      width: 200
      height: 100

  - id: stripe-api
    type: integration/third-party-api
    displayName: Stripe
    args:
      provider: Stripe
      protocol: REST
      authMethod: API Key
    position:
      x: 650
      y: 50
      width: 200
      height: 100

edges:
  - fromNode: web-app
    toNode: api-gateway
    type: sync
    label: HTTPS

  - fromNode: api-gateway
    toNode: backend-service
    type: sync
    label: HTTP

  - fromNode: backend-service
    toNode: database
    type: sync
    label: SQL

  - fromNode: backend-service
    toNode: cache
    type: sync
    label: Redis Protocol

  - fromNode: backend-service
    toNode: auth-provider
    type: sync
    label: OIDC

  - fromNode: backend-service
    toNode: stripe-api
    type: sync
    label: Stripe API

  - fromNode: backend-service
    toNode: logging
    type: async
    label: Log Events
