kind: StackTemplate
apiVersion: v1
metadata:
  name: microservices-platform
  displayName: Microservices Platform
  description: Kubernetes-based microservices platform with Envoy load balancer, Kong API Gateway, three Go services, Kafka event bus with Kafka Streams processor, PostgreSQL, Redis and Elasticsearch for data, and full observability with Prometheus/Grafana, Jaeger, and Loki.
  icon: Network
  tags:
    - microservices
    - kubernetes
    - kafka
    - observability

nodes:
  - id: envoy-lb
    type: network/load-balancer
    displayName: Envoy LB
    args:
      type: Envoy
      algorithm: round-robin
      healthCheckPath: /health
      stickySession: false
    position:
      x: 50
      y: 300
      width: 200
      height: 100

  - id: kong-gateway
    type: compute/api-gateway
    displayName: Kong API Gateway
    args:
      provider: Kong
      rateLimit: 5000
      authMethod: JWT
    position:
      x: 350
      y: 300
      width: 200
      height: 100

  - id: user-service
    type: compute/service
    displayName: User Service
    args:
      language: Go
      framework: Gin
      replicas: 3
      healthCheck: /health
    position:
      x: 650
      y: 100
      width: 200
      height: 100

  - id: order-service
    type: compute/service
    displayName: Order Service
    args:
      language: Go
      framework: Gin
      replicas: 3
      healthCheck: /health
    position:
      x: 650
      y: 300
      width: 200
      height: 100

  - id: product-service
    type: compute/service
    displayName: Product Service
    args:
      language: Go
      framework: Gin
      replicas: 3
      healthCheck: /health
    position:
      x: 650
      y: 500
      width: 200
      height: 100

  - id: kafka-bus
    type: messaging/event-bus
    displayName: Kafka Event Bus
    args:
      provider: Kafka
      partitions: 12
      retentionHours: 168
    position:
      x: 950
      y: 300
      width: 200
      height: 100

  - id: kafka-streams
    type: messaging/stream-processor
    displayName: Kafka Streams Processor
    args:
      engine: Kafka Streams
      windowType: tumbling
      windowDuration: 5m
    position:
      x: 1250
      y: 300
      width: 200
      height: 100

  - id: postgresql
    type: data/database
    displayName: PostgreSQL
    args:
      engine: PostgreSQL
      version: "16"
      maxConnections: 200
    position:
      x: 950
      y: 50
      width: 200
      height: 100

  - id: redis-cache
    type: data/cache
    displayName: Redis Cache
    args:
      engine: Redis
      maxMemoryMB: 1024
      evictionPolicy: allkeys-lru
    position:
      x: 1250
      y: 50
      width: 200
      height: 100

  - id: elasticsearch
    type: data/search-index
    displayName: Elasticsearch
    args:
      engine: Elasticsearch
      indexName: primary
      replicas: 2
      analyzers: standard
    position:
      x: 1250
      y: 550
      width: 200
      height: 100

  - id: prometheus-grafana
    type: observability/monitoring
    displayName: Prometheus/Grafana
    args:
      platform: Prometheus/Grafana
      scrapeInterval: 15s
    position:
      x: 350
      y: 600
      width: 200
      height: 100

  - id: jaeger-tracing
    type: observability/tracing
    displayName: Jaeger Tracing
    args:
      platform: Jaeger
      samplingRate: 0.1
      exportFormat: OTLP
      retentionDays: 14
    position:
      x: 50
      y: 600
      width: 200
      height: 100

  - id: loki-logging
    type: observability/logging
    displayName: Loki/Grafana Logging
    args:
      stack: Loki/Grafana
      retentionDays: 30
      structuredLogs: true
    position:
      x: 650
      y: 700
      width: 200
      height: 100

edges:
  - fromNode: envoy-lb
    toNode: kong-gateway
    type: sync
    label: Route Traffic

  - fromNode: kong-gateway
    toNode: user-service
    type: sync
    label: /api/users

  - fromNode: kong-gateway
    toNode: order-service
    type: sync
    label: /api/orders

  - fromNode: kong-gateway
    toNode: product-service
    type: sync
    label: /api/products

  - fromNode: user-service
    toNode: kafka-bus
    type: async
    label: Publish Events

  - fromNode: order-service
    toNode: kafka-bus
    type: async
    label: Publish Events

  - fromNode: product-service
    toNode: kafka-bus
    type: async
    label: Publish Events

  - fromNode: kafka-bus
    toNode: kafka-streams
    type: async
    label: Stream Processing

  - fromNode: user-service
    toNode: postgresql
    type: sync
    label: Read/Write Users

  - fromNode: order-service
    toNode: postgresql
    type: sync
    label: Read/Write Orders

  - fromNode: product-service
    toNode: postgresql
    type: sync
    label: Read/Write Products

  - fromNode: user-service
    toNode: redis-cache
    type: sync
    label: Cache Lookups

  - fromNode: order-service
    toNode: redis-cache
    type: sync
    label: Cache Lookups

  - fromNode: kafka-streams
    toNode: elasticsearch
    type: async
    label: Index Events

  - fromNode: user-service
    toNode: prometheus-grafana
    type: async
    label: Metrics

  - fromNode: order-service
    toNode: prometheus-grafana
    type: async
    label: Metrics

  - fromNode: product-service
    toNode: prometheus-grafana
    type: async
    label: Metrics

  - fromNode: user-service
    toNode: jaeger-tracing
    type: async
    label: Traces

  - fromNode: order-service
    toNode: jaeger-tracing
    type: async
    label: Traces

  - fromNode: product-service
    toNode: jaeger-tracing
    type: async
    label: Traces

  - fromNode: user-service
    toNode: loki-logging
    type: async
    label: Logs

  - fromNode: order-service
    toNode: loki-logging
    type: async
    label: Logs

  - fromNode: product-service
    toNode: loki-logging
    type: async
    label: Logs
