kind: StackTemplate
apiVersion: v1
metadata:
  name: e-commerce-platform
  displayName: E-Commerce Platform
  description: Enterprise e-commerce architecture with Next.js storefront, React Native mobile app, Cloudflare CDN, Kong API Gateway, microservices (Catalog, Order, Payment), PostgreSQL, Redis, Elasticsearch, S3, Kafka event bus, push notifications, Stripe & Shippo integrations, Auth0 identity, and Prometheus/Grafana + Loki observability.
  icon: ShoppingCart
  tags:
    - e-commerce
    - marketplace
    - enterprise

nodes:
  - id: web-storefront
    type: client/web-app
    displayName: Next.js Storefront
    args:
      framework: Next.js
      rendering: SSR
      hosting: Vercel
    position:
      x: 50
      y: 100
      width: 200
      height: 100

  - id: mobile-app
    type: client/mobile-app
    displayName: Shopping App
    args:
      framework: React Native
      platforms: iOS, Android
    position:
      x: 50
      y: 300
      width: 200
      height: 100

  - id: cdn
    type: network/cdn
    displayName: Cloudflare CDN
    args:
      provider: Cloudflare
      cacheStrategy: aggressive
    position:
      x: 350
      y: 200
      width: 200
      height: 100

  - id: load-balancer
    type: network/load-balancer
    displayName: ALB
    args:
      provider: AWS ALB
      algorithm: round-robin
      healthCheck: /health
    position:
      x: 650
      y: 200
      width: 200
      height: 100

  - id: api-gateway
    type: compute/api-gateway
    displayName: Kong API Gateway
    args:
      provider: Kong
      rateLimit: 5000
      authMethod: JWT
    position:
      x: 950
      y: 200
      width: 200
      height: 100

  - id: catalog-service
    type: compute/service
    displayName: Catalog Service
    args:
      language: TypeScript
      framework: NestJS
      protocol: REST
      domain: catalog
    position:
      x: 1250
      y: 50
      width: 200
      height: 100

  - id: order-service
    type: compute/service
    displayName: Order Service
    args:
      language: TypeScript
      framework: NestJS
      protocol: REST
      domain: orders
    position:
      x: 1250
      y: 200
      width: 200
      height: 100

  - id: payment-service
    type: compute/service
    displayName: Payment Service
    args:
      language: TypeScript
      framework: NestJS
      protocol: REST
      domain: payments
    position:
      x: 1250
      y: 350
      width: 200
      height: 100

  - id: database
    type: data/database
    displayName: PostgreSQL
    args:
      engine: PostgreSQL
      version: "16"
      maxConnections: 200
    position:
      x: 1550
      y: 50
      width: 200
      height: 100

  - id: cache
    type: data/cache
    displayName: Redis Cache
    args:
      engine: Redis
      maxMemory: 512mb
      evictionPolicy: allkeys-lru
    position:
      x: 1550
      y: 200
      width: 200
      height: 100

  - id: search-index
    type: data/search-index
    displayName: Elasticsearch
    args:
      engine: Elasticsearch
      version: "8"
      replicas: 2
    position:
      x: 1550
      y: 350
      width: 200
      height: 100

  - id: object-storage
    type: data/object-storage
    displayName: S3 Product Images
    args:
      provider: AWS S3
      bucket: product-images
      publicAccess: true
    position:
      x: 1550
      y: 500
      width: 200
      height: 100

  - id: event-bus
    type: messaging/event-bus
    displayName: Kafka Event Bus
    args:
      provider: Kafka
      partitions: 12
      replicationFactor: 3
    position:
      x: 1250
      y: 500
      width: 200
      height: 100

  - id: notification
    type: messaging/notification
    displayName: Push Notifications
    args:
      providers: FCM, SNS
      channels: push, email, sms
    position:
      x: 950
      y: 500
      width: 200
      height: 100

  - id: stripe-api
    type: integration/third-party-api
    displayName: Stripe Payments
    args:
      provider: Stripe
      protocol: REST
      authMethod: API Key
    position:
      x: 1550
      y: 650
      width: 200
      height: 100

  - id: shippo-api
    type: integration/third-party-api
    displayName: Shippo Shipping
    args:
      provider: Shippo
      protocol: REST
      authMethod: API Key
    position:
      x: 1250
      y: 650
      width: 200
      height: 100

  - id: webhook
    type: integration/webhook
    displayName: Outbound Webhooks
    args:
      direction: outbound
      retryPolicy: exponential-backoff
      maxRetries: 5
    position:
      x: 950
      y: 650
      width: 200
      height: 100

  - id: auth-provider
    type: security/auth-provider
    displayName: Auth0 Identity
    args:
      provider: Auth0
      protocol: OIDC
      mfaEnabled: true
      socialLogin: true
    position:
      x: 950
      y: 0
      width: 200
      height: 100

  - id: monitoring
    type: observability/monitoring
    displayName: Prometheus/Grafana
    args:
      platform: Prometheus
      dashboard: Grafana
      retentionDays: 90
    position:
      x: 650
      y: 500
      width: 200
      height: 100

  - id: logging
    type: observability/logging
    displayName: Loki/Grafana Logging
    args:
      platform: Loki
      dashboard: Grafana
      retentionDays: 30
      structured: true
    position:
      x: 650
      y: 650
      width: 200
      height: 100

edges:
  - fromNode: web-storefront
    toNode: cdn
    type: sync
    label: HTTPS

  - fromNode: mobile-app
    toNode: cdn
    type: sync
    label: HTTPS

  - fromNode: cdn
    toNode: load-balancer
    type: sync
    label: HTTPS

  - fromNode: load-balancer
    toNode: api-gateway
    type: sync
    label: HTTP

  - fromNode: api-gateway
    toNode: catalog-service
    type: sync
    label: REST

  - fromNode: api-gateway
    toNode: order-service
    type: sync
    label: REST

  - fromNode: api-gateway
    toNode: payment-service
    type: sync
    label: REST

  - fromNode: catalog-service
    toNode: database
    type: sync
    label: SQL

  - fromNode: catalog-service
    toNode: cache
    type: sync
    label: Redis Protocol

  - fromNode: catalog-service
    toNode: search-index
    type: sync
    label: Elasticsearch API

  - fromNode: catalog-service
    toNode: object-storage
    type: sync
    label: S3 API

  - fromNode: order-service
    toNode: database
    type: sync
    label: SQL

  - fromNode: order-service
    toNode: event-bus
    type: async
    label: Order Events

  - fromNode: payment-service
    toNode: stripe-api
    type: sync
    label: Stripe API

  - fromNode: order-service
    toNode: shippo-api
    type: sync
    label: Shippo API

  - fromNode: order-service
    toNode: webhook
    type: async
    label: Order Webhooks

  - fromNode: event-bus
    toNode: notification
    type: async
    label: Event Notifications

  - fromNode: catalog-service
    toNode: logging
    type: async
    label: Log Events

  - fromNode: order-service
    toNode: logging
    type: async
    label: Log Events

  - fromNode: payment-service
    toNode: logging
    type: async
    label: Log Events

  - fromNode: catalog-service
    toNode: monitoring
    type: async
    label: Metrics

  - fromNode: order-service
    toNode: monitoring
    type: async
    label: Metrics

  - fromNode: payment-service
    toNode: monitoring
    type: async
    label: Metrics
