entities:
  - name: ChatEvent
    description: Streaming event from AI (text, tool_call, tool_result, permission_request, done, error). Union type flowing over WebSocket and async iterables.
    codeRefs:
      - src-web/core/ai/types.ts
  - name: StoreAction
    description: Named action + args dispatched from AI tools to Zustand stores via storeActionDispatcher (e.g., addNode, addEdge, list, describe).
    codeRefs:
      - src-web/core/ai/storeActionDispatcher.ts
  - name: CanvasFile
    description: YAML-serializable canvas with nodes, edges, entities, and project metadata. One file per scope in .archcanvas/ directory.
    codeRefs:
      - src-web/types/schema.ts
  - name: NodeDef
    description: Node type definition — shape, icon, ports, args, AI hints. ~40 built-ins across 9 namespaces. Validated with Zod schemas.
    codeRefs:
      - src-web/types/nodeDefSchema.ts
  - name: EngineResult
    description: Result of a graph mutation — ok discriminant, Immer patches for undo/redo, and warnings. Produced by engine.ts, consumed by graphStore.
    codeRefs:
      - src-web/core/graph/engine.ts
edges:
  - from:
      node: react-spa
    to:
      node: ai-bridge
    protocol: WebSocket
    label: Chat messages & store action relay
  - from:
      node: react-spa
    to:
      node: anthropic-api
    protocol: HTTPS
    label: Direct API (API key provider, browser-side)
  - from:
      node: ai-bridge
    to:
      node: anthropic-api
    protocol: HTTPS
    label: Claude Agent SDK → Messages API
  - from:
      node: react-spa
    to:
      node: yaml-files
    protocol: FileSystem
    label: Open/Save projects via Platform FileSystem
  - from:
      node: tauri-shell
    to:
      node: ai-bridge
    label: Spawns sidecar binary, discovers port via stdout
  - from:
      node: tauri-shell
    to:
      node: react-spa
    label: Hosts webview, exposes Tauri IPC commands
  - from:
      node: tauri-shell
    to:
      node: github-releases
    protocol: HTTPS
    label: Auto-update check (tauri-plugin-updater)
  - from:
      node: vite-dev-server
    to:
      node: ai-bridge
    label: Embeds bridge via Vite plugin (dev mode)
  - from:
      node: vite-dev-server
    to:
      node: react-spa
    protocol: HTTP
    label: Serves frontend + HMR
