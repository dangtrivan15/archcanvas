<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- v2: Atmospheric perspective, swapped layout, gradient edges, breadcrumb, standing base fix -->
  <defs>
    <clipPath id="clip"><rect width="128" height="128" rx="28"/></clipPath>
    <filter id="blur"><feGaussianBlur stdDeviation="2"/></filter>
    <pattern id="dots" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(60)">
      <circle cx="4" cy="4" r="1.2" fill="#dfdad9"/>
    </pattern>
    <!-- BC Mid atmospheric fade toward upper-right -->
    <linearGradient id="atmos-fade" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="white"/>
      <stop offset="40%" stop-color="white" stop-opacity="0.9"/>
      <stop offset="68%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.25"/>
    </linearGradient>
    <mask id="atmos-mask"><rect width="128" height="128" fill="url(#atmos-fade)"/></mask>
    <!-- Warm→cool surface tint -->
    <linearGradient id="surface-tint" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0dcc4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#d4e0ef" stop-opacity="0.10"/>
    </linearGradient>
    <!-- Gradient edges -->
    <linearGradient id="edge-human-ai" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#907aa9"/>
      <stop offset="100%" stop-color="#ea9d34"/>
    </linearGradient>
    <linearGradient id="edge-ai-canvas" x1="1" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ea9d34"/>
      <stop offset="100%" stop-color="#56949f"/>
    </linearGradient>
    <linearGradient id="edge-human-canvas" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#907aa9"/>
      <stop offset="100%" stop-color="#56949f"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#clip)">
    <!-- Background -->
    <rect width="128" height="128" fill="#faf4ed"/>
    <rect width="128" height="128" fill="url(#dots)" mask="url(#atmos-mask)"/>
    <rect width="128" height="128" fill="url(#surface-tint)"/>

    <!-- Breadcrumb path (upper-left corner) -->
    <rect x="14" y="12" width="10" height="2.5" rx="1.2" fill="#575279" opacity="0.13"/>
    <path d="M26 13.2 L28 13.2" stroke="#575279" stroke-width="0.8" opacity="0.10" stroke-linecap="round"/>
    <rect x="30" y="12" width="14" height="2.5" rx="1.2" fill="#575279" opacity="0.10"/>
    <path d="M46 13.2 L48 13.2" stroke="#575279" stroke-width="0.8" opacity="0.08" stroke-linecap="round"/>
    <rect x="50" y="12" width="8" height="2.5" rx="1.2" fill="#575279" opacity="0.07"/>

    <!-- Contact shadows -->
    <ellipse cx="26" cy="72" rx="14" ry="4" fill="#575279" opacity="0.08" filter="url(#blur)"/>
    <ellipse cx="92" cy="48" rx="11" ry="2.5" fill="#575279" opacity="0.05" filter="url(#blur)"/>
    <ellipse cx="88" cy="108" rx="18" ry="4.5" fill="#575279" opacity="0.07" filter="url(#blur)"/>

    <!-- Connecting edges (gradient) -->
    <line x1="26" y1="55" x2="92" y2="36" stroke="url(#edge-human-ai)" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
    <line x1="92" y1="36" x2="88" y2="86" stroke="url(#edge-ai-canvas)" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
    <line x1="26" y1="55" x2="88" y2="86" stroke="url(#edge-human-canvas)" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>

    <!-- AI ROBOT — upper-right, smallest (farthest) -->
    <rect x="82" y="42" width="20" height="3" rx="1.2" fill="#ea9d34" opacity="0.55"/>
    <line x1="92" y1="25" x2="92" y2="28" stroke="#ea9d34" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="92" cy="23.5" r="2" fill="#ea9d34"/>
    <rect x="82" y="28" width="20" height="15" rx="4.5" fill="#ea9d34"/>
    <circle cx="89" cy="35" r="2" fill="#faf4ed"/>
    <circle cx="95" cy="35" r="2" fill="#faf4ed"/>
    <circle cx="89.6" cy="35" r="1" fill="#575279"/>
    <circle cx="95.6" cy="35" r="1" fill="#575279"/>

    <!-- HUMAN — upper-left, medium -->
    <ellipse cx="26" cy="70" rx="12" ry="3.5" fill="#907aa9" opacity="0.55"/>
    <circle cx="26" cy="57" r="13" fill="#907aa9"/>
    <circle cx="26" cy="53" r="3.3" fill="#faf4ed" opacity="0.85"/>
    <path d="M21 63 Q26 59 31 63" fill="none" stroke="#faf4ed" stroke-width="2.2" stroke-linecap="round" opacity="0.85"/>
    <circle cx="22" cy="53" r="2.8" fill="#faf4ed" opacity="0.1"/>

    <!-- SUBCANVAS — bottom-right, largest (closest) -->
    <rect x="68" y="103" width="40" height="6" rx="2.5" fill="#56949f" opacity="0.55"/>
    <rect x="68" y="83" width="40" height="22" rx="4" fill="#56949f"/>
    <!-- Centered mini diagram -->
    <line x1="76" y1="90" x2="84" y2="97" stroke="#faf4ed" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
    <line x1="84" y1="97" x2="98" y2="91" stroke="#faf4ed" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
    <line x1="76" y1="90" x2="98" y2="91" stroke="#faf4ed" stroke-width="0.8" stroke-linecap="round" opacity="0.3"/>
    <rect x="73" y="88" width="5" height="4" rx="1" fill="#faf4ed" opacity="0.7"/>
    <circle cx="84" cy="97" r="2" fill="#faf4ed" opacity="0.6"/>
    <rect x="95" y="89" width="6" height="4" rx="1" fill="#faf4ed" opacity="0.7"/>

    <!-- Thin subtle border -->
    <rect width="128" height="128" rx="28" fill="none" stroke="#575279" stroke-width="1" opacity="0.12"/>
  </g>
</svg>
