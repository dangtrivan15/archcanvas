kind: StackTemplate
apiVersion: v1
metadata:
  name: data-platform
  displayName: Data Platform
  description: Analytics & data engineering stack with PostgreSQL (OLTP), ClickHouse (OLAP warehouse), dbt transformations, Flink stream processing, Kafka event bus, S3 data lake, Elasticsearch search, Redis cache, Airflow scheduler, and Grafana monitoring.
  icon: BarChart3
  tags:
    - data
    - analytics
    - data-engineering
    - kafka
    - flink

nodes:
  - id: postgres
    type: data/database
    displayName: PostgreSQL (OLTP)
    args:
      engine: PostgreSQL
      version: "16"
      maxConnections: 200
    position:
      x: 50
      y: 200
      width: 200
      height: 100

  - id: kafka
    type: messaging/event-bus
    displayName: Kafka Event Bus
    args:
      platform: Kafka
      partitions: 12
      replicationFactor: 3
      retentionHours: 168
    position:
      x: 350
      y: 200
      width: 200
      height: 100

  - id: flink
    type: messaging/stream-processor
    displayName: Flink Stream Processor
    args:
      engine: Apache Flink
      parallelism: 4
      checkpointIntervalMs: 60000
      stateBackend: RocksDB
    position:
      x: 650
      y: 200
      width: 200
      height: 100

  - id: clickhouse
    type: data/database
    displayName: ClickHouse (OLAP)
    args:
      engine: ClickHouse
      version: "24"
      maxConnections: 100
    position:
      x: 950
      y: 100
      width: 200
      height: 100

  - id: s3-datalake
    type: data/object-storage
    displayName: S3 Data Lake
    args:
      provider: AWS S3
      versioning: true
      encryption: AES-256
    position:
      x: 950
      y: 300
      width: 200
      height: 100

  - id: dbt
    type: integration/etl-pipeline
    displayName: dbt Transformations
    args:
      engine: dbt
      schedule: daily
      parallelism: 4
    position:
      x: 1250
      y: 100
      width: 200
      height: 100

  - id: elasticsearch
    type: data/search-index
    displayName: Elasticsearch
    args:
      engine: Elasticsearch
      indexName: analytics
      replicas: 2
    position:
      x: 1250
      y: 300
      width: 200
      height: 100

  - id: redis
    type: data/cache
    displayName: Redis Cache
    args:
      engine: Redis
      maxMemoryMB: 4096
      evictionPolicy: allkeys-lru
      clusterMode: true
    position:
      x: 1250
      y: 500
      width: 200
      height: 100

  - id: airflow
    type: compute/cron-job
    displayName: Airflow Scheduler
    args:
      schedule: "0 * * * *"
      runtime: Python 3.11
      timeoutSec: 3600
    position:
      x: 650
      y: 450
      width: 200
      height: 100

  - id: grafana
    type: observability/monitoring
    displayName: Grafana Monitoring
    args:
      platform: Grafana
      retentionDays: 90
      alerting: true
    position:
      x: 650
      y: 0
      width: 200
      height: 100

edges:
  - fromNode: postgres
    toNode: kafka
    type: async
    label: CDC Events

  - fromNode: kafka
    toNode: flink
    type: data_flow
    label: Stream Data

  - fromNode: flink
    toNode: clickhouse
    type: data_flow
    label: Processed Events

  - fromNode: flink
    toNode: s3-datalake
    type: data_flow
    label: Raw Archives

  - fromNode: airflow
    toNode: dbt
    type: sync
    label: Trigger Transform

  - fromNode: dbt
    toNode: clickhouse
    type: data_flow
    label: Transform & Load

  - fromNode: clickhouse
    toNode: elasticsearch
    type: data_flow
    label: Index Data

  - fromNode: clickhouse
    toNode: redis
    type: data_flow
    label: Cache Results

  - fromNode: postgres
    toNode: grafana
    type: async
    label: Metrics

  - fromNode: kafka
    toNode: grafana
    type: async
    label: Metrics

  - fromNode: flink
    toNode: grafana
    type: async
    label: Metrics

  - fromNode: clickhouse
    toNode: grafana
    type: async
    label: Metrics
