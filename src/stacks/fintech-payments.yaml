kind: StackTemplate
apiVersion: v1
metadata:
  name: fintech-payments
  displayName: FinTech / Payments
  description: Enterprise banking and payment processing platform. React portal + Flutter mobile app through Kong API Gateway to Java microservices (Account, Transaction, Fraud). PostgreSQL for OLTP, CockroachDB for distributed ledger, Redis caching, Neo4j fraud graph. Kafka event bus with Flink real-time fraud scoring. Keycloak MFA, HashiCorp Vault for PCI secrets, AWS WAF. Plaid and SWIFT integrations. Full observability with Prometheus, Jaeger, and ELK.
  icon: Landmark
  tags:
    - fintech
    - banking
    - payments
    - PCI
    - enterprise

nodes:
  - id: web-portal
    type: client/web-app
    displayName: React Portal
    args:
      framework: React
      rendering: SPA
      hosting: AWS CloudFront
    position:
      x: 50
      y: 50
      width: 200
      height: 100

  - id: mobile-app
    type: client/mobile-app
    displayName: Flutter Mobile
    args:
      framework: Flutter
      platforms: iOS,Android
      stateManagement: BLoC
    position:
      x: 50
      y: 200
      width: 200
      height: 100

  - id: api-gateway
    type: compute/api-gateway
    displayName: Kong API Gateway
    args:
      provider: Kong
      rateLimit: 5000
      authMethod: JWT
    position:
      x: 350
      y: 125
      width: 200
      height: 100

  - id: account-service
    type: compute/service
    displayName: Account Service
    args:
      language: Java
      framework: Spring Boot
      protocol: gRPC
    position:
      x: 650
      y: 50
      width: 200
      height: 100

  - id: transaction-service
    type: compute/service
    displayName: Transaction Service
    args:
      language: Java
      framework: Spring Boot
      protocol: gRPC
    position:
      x: 650
      y: 200
      width: 200
      height: 100

  - id: fraud-service
    type: compute/service
    displayName: Fraud Service
    args:
      language: Java
      framework: Spring Boot
      protocol: gRPC
    position:
      x: 650
      y: 350
      width: 200
      height: 100

  - id: postgresql
    type: data/database
    displayName: PostgreSQL (OLTP)
    args:
      engine: PostgreSQL
      version: "16"
      maxConnections: 500
    position:
      x: 950
      y: 50
      width: 200
      height: 100

  - id: cockroachdb
    type: data/database
    displayName: CockroachDB (Ledger)
    args:
      engine: CockroachDB
      version: "23.2"
      maxConnections: 300
    position:
      x: 950
      y: 200
      width: 200
      height: 100

  - id: redis
    type: data/cache
    displayName: Redis
    args:
      engine: Redis
      maxMemory: 1gb
      evictionPolicy: volatile-lru
    position:
      x: 950
      y: 350
      width: 200
      height: 100

  - id: neo4j
    type: data/graph-database
    displayName: Neo4j (Fraud Graph)
    args:
      engine: Neo4j
      queryLanguage: Cypher
      storageGB: 100
      replication: primary-replica
    position:
      x: 950
      y: 500
      width: 200
      height: 100

  - id: kafka
    type: messaging/event-bus
    displayName: Kafka Event Bus
    args:
      provider: Apache Kafka
      partitions: 12
      replicationFactor: 3
    position:
      x: 650
      y: 500
      width: 200
      height: 100

  - id: flink
    type: messaging/stream-processor
    displayName: Flink (Fraud Scoring)
    args:
      engine: Apache Flink
      parallelism: 8
      checkpointInterval: 30s
    position:
      x: 650
      y: 650
      width: 200
      height: 100

  - id: keycloak
    type: security/auth-provider
    displayName: Keycloak MFA
    args:
      provider: Keycloak
      protocol: OIDC
      mfaEnabled: true
    position:
      x: 350
      y: 350
      width: 200
      height: 100

  - id: vault
    type: security/vault
    displayName: HashiCorp Vault
    args:
      provider: HashiCorp Vault
      engine: transit
      autoUnseal: true
    position:
      x: 350
      y: 500
      width: 200
      height: 100

  - id: waf
    type: security/waf
    displayName: AWS WAF
    args:
      provider: AWS WAF
      ruleSet: AWSManagedRulesCommonRuleSet
      rateLimit: 10000
    position:
      x: 350
      y: 0
      width: 200
      height: 100

  - id: plaid
    type: integration/third-party-api
    displayName: Plaid
    args:
      provider: Plaid
      protocol: REST
      authMethod: API Key
    position:
      x: 1250
      y: 50
      width: 200
      height: 100

  - id: swift
    type: integration/third-party-api
    displayName: SWIFT
    args:
      provider: SWIFT
      protocol: REST
      authMethod: mTLS
    position:
      x: 1250
      y: 200
      width: 200
      height: 100

  - id: prometheus
    type: observability/monitoring
    displayName: Prometheus/Grafana
    args:
      platform: Prometheus/Grafana
      scrapeInterval: 15s
      alertChannels: pagerduty,slack
    position:
      x: 1250
      y: 350
      width: 200
      height: 100

  - id: jaeger
    type: observability/tracing
    displayName: Jaeger
    args:
      platform: Jaeger
      samplingRate: 0.1
      exportFormat: OTLP
      retentionDays: 30
    position:
      x: 1250
      y: 500
      width: 200
      height: 100

  - id: elk
    type: observability/logging
    displayName: ELK Stack
    args:
      platform: ELK
      retentionDays: 90
      structured: true
    position:
      x: 1250
      y: 650
      width: 200
      height: 100

edges:
  - fromNode: web-portal
    toNode: api-gateway
    type: sync
    label: HTTPS

  - fromNode: mobile-app
    toNode: api-gateway
    type: sync
    label: HTTPS

  - fromNode: waf
    toNode: api-gateway
    type: sync
    label: WAF Filter

  - fromNode: api-gateway
    toNode: account-service
    type: sync
    label: gRPC

  - fromNode: api-gateway
    toNode: transaction-service
    type: sync
    label: gRPC

  - fromNode: api-gateway
    toNode: fraud-service
    type: sync
    label: gRPC

  - fromNode: account-service
    toNode: postgresql
    type: sync
    label: SQL

  - fromNode: transaction-service
    toNode: cockroachdb
    type: sync
    label: SQL

  - fromNode: transaction-service
    toNode: kafka
    type: async
    label: Transaction Events

  - fromNode: kafka
    toNode: flink
    type: data_flow
    label: Stream Processing

  - fromNode: flink
    toNode: fraud-service
    type: sync
    label: Fraud Score

  - fromNode: fraud-service
    toNode: neo4j
    type: sync
    label: Graph Query

  - fromNode: account-service
    toNode: vault
    type: sync
    label: PCI Secrets

  - fromNode: transaction-service
    toNode: vault
    type: sync
    label: PCI Secrets

  - fromNode: fraud-service
    toNode: vault
    type: sync
    label: PCI Secrets

  - fromNode: account-service
    toNode: plaid
    type: sync
    label: Bank Link

  - fromNode: transaction-service
    toNode: swift
    type: sync
    label: Wire Transfer

  - fromNode: account-service
    toNode: jaeger
    type: async
    label: Traces

  - fromNode: transaction-service
    toNode: jaeger
    type: async
    label: Traces

  - fromNode: fraud-service
    toNode: jaeger
    type: async
    label: Traces

  - fromNode: account-service
    toNode: elk
    type: async
    label: Logs

  - fromNode: transaction-service
    toNode: elk
    type: async
    label: Logs

  - fromNode: fraud-service
    toNode: elk
    type: async
    label: Logs

  - fromNode: account-service
    toNode: prometheus
    type: async
    label: Metrics

  - fromNode: transaction-service
    toNode: prometheus
    type: async
    label: Metrics

  - fromNode: fraud-service
    toNode: prometheus
    type: async
    label: Metrics
