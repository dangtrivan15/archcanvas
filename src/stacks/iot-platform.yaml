kind: StackTemplate
apiVersion: v1
metadata:
  name: iot-platform
  displayName: IoT Platform
  description: Enterprise IoT platform with device dashboard, field technician app, AWS API Gateway, device management and telemetry services, Lambda event processing, Kafka telemetry stream, Flink anomaly detection, PostgreSQL device registry, ClickHouse time-series store, Redis device state cache, S3 firmware storage, SNS device alerts, Cognito identity, AWS Secrets Manager for device certificates, and Prometheus/Loki observability.
  icon: Radio
  tags:
    - IoT
    - telemetry
    - real-time
    - enterprise

nodes:
  - id: device-dashboard
    type: client/web-app
    displayName: Device Dashboard
    args:
      framework: React
      rendering: SPA
      authProvider: Cognito
    position:
      x: 50
      y: 50
      width: 200
      height: 100

  - id: field-technician-app
    type: client/mobile-app
    displayName: Field Technician App
    args:
      platform: Flutter
      minOS: "iOS 15 / Android 12"
      pushNotifications: true
    position:
      x: 50
      y: 200
      width: 200
      height: 100

  - id: api-gateway
    type: compute/api-gateway
    displayName: AWS API Gateway
    args:
      provider: AWS API Gateway
      rateLimiting: true
      authentication: Cognito Authorizer
    position:
      x: 350
      y: 125
      width: 200
      height: 100

  - id: device-management
    type: compute/service
    displayName: Device Management
    args:
      language: TypeScript
      framework: Express
      healthCheck: true
      domain: device-management
    position:
      x: 650
      y: 50
      width: 200
      height: 100

  - id: telemetry-service
    type: compute/service
    displayName: Telemetry Service
    args:
      language: TypeScript
      framework: Express
      healthCheck: true
      domain: telemetry-ingestion
    position:
      x: 650
      y: 200
      width: 200
      height: 100

  - id: event-processor
    type: compute/function
    displayName: Event Processor
    args:
      runtime: Node.js 20
      provider: AWS Lambda
      memoryMB: 512
      timeoutSeconds: 30
    position:
      x: 650
      y: 350
      width: 200
      height: 100

  - id: event-bus
    type: messaging/event-bus
    displayName: Device Telemetry Stream
    args:
      provider: Kafka
      partitions: 24
      replicationFactor: 3
      retentionHours: 168
    position:
      x: 950
      y: 200
      width: 200
      height: 100

  - id: flink-anomaly
    type: messaging/stream-processor
    displayName: Anomaly Detection
    args:
      engine: Flink
      parallelism: 4
      checkpointIntervalMs: 10000
      windowSize: 60s
    position:
      x: 1250
      y: 200
      width: 200
      height: 100

  - id: postgresql
    type: data/database
    displayName: PostgreSQL
    args:
      engine: PostgreSQL
      version: "16"
      maxConnections: 200
      purpose: device registry
    position:
      x: 950
      y: 50
      width: 200
      height: 100

  - id: clickhouse
    type: data/database
    displayName: ClickHouse
    args:
      engine: ClickHouse
      version: "24"
      purpose: time-series telemetry
      replication: true
    position:
      x: 1250
      y: 350
      width: 200
      height: 100

  - id: cache
    type: data/cache
    displayName: Redis
    args:
      engine: Redis
      maxMemory: 4GB
      evictionPolicy: allkeys-lru
      purpose: device state cache
    position:
      x: 950
      y: 350
      width: 200
      height: 100

  - id: firmware-storage
    type: data/object-storage
    displayName: S3 Firmware & Logs
    args:
      provider: AWS S3
      versioning: true
      lifecycle: 90-day-archive
    position:
      x: 950
      y: 500
      width: 200
      height: 100

  - id: device-alerts
    type: messaging/notification
    displayName: Device Alerts
    args:
      provider: SNS
      channels: SMS,email,push
      throttling: true
    position:
      x: 1250
      y: 500
      width: 200
      height: 100

  - id: cognito-auth
    type: security/auth-provider
    displayName: Cognito Identity
    args:
      provider: Cognito
      protocol: OIDC
      deviceIdentity: true
      userPools: device,technician,admin
    position:
      x: 50
      y: 400
      width: 200
      height: 100

  - id: secrets-manager
    type: security/vault
    displayName: AWS Secrets Manager
    args:
      provider: AWS Secrets Manager
      rotationEnabled: true
      purpose: device certificates
    position:
      x: 350
      y: 400
      width: 200
      height: 100

  - id: monitoring
    type: observability/monitoring
    displayName: Prometheus/Grafana
    args:
      platform: Prometheus/Grafana
      scrapeInterval: 15s
      alertChannels: pagerduty,slack
    position:
      x: 350
      y: 550
      width: 200
      height: 100

  - id: logging
    type: observability/logging
    displayName: Loki/Grafana
    args:
      platform: Loki/Grafana
      retentionDays: 90
      structuredLogs: true
    position:
      x: 50
      y: 550
      width: 200
      height: 100

edges:
  - fromNode: device-dashboard
    toNode: api-gateway
    type: sync
    label: HTTPS

  - fromNode: field-technician-app
    toNode: api-gateway
    type: sync
    label: HTTPS

  - fromNode: api-gateway
    toNode: device-management
    type: sync
    label: Device API

  - fromNode: api-gateway
    toNode: telemetry-service
    type: sync
    label: Telemetry API

  - fromNode: device-management
    toNode: postgresql
    type: sync
    label: Device Registry

  - fromNode: device-management
    toNode: cache
    type: sync
    label: Device State

  - fromNode: device-management
    toNode: firmware-storage
    type: sync
    label: Firmware OTA

  - fromNode: telemetry-service
    toNode: event-bus
    type: async
    label: Publish Telemetry

  - fromNode: event-bus
    toNode: flink-anomaly
    type: data_flow
    label: Stream Processing

  - fromNode: event-bus
    toNode: event-processor
    type: async
    label: Event Trigger

  - fromNode: flink-anomaly
    toNode: clickhouse
    type: data_flow
    label: Store Time-Series

  - fromNode: flink-anomaly
    toNode: device-alerts
    type: async
    label: Anomaly Alerts

  - fromNode: device-management
    toNode: secrets-manager
    type: sync
    label: Device Certs

  - fromNode: telemetry-service
    toNode: secrets-manager
    type: sync
    label: Device Certs

  - fromNode: device-management
    toNode: monitoring
    type: async
    label: Metrics

  - fromNode: telemetry-service
    toNode: monitoring
    type: async
    label: Metrics

  - fromNode: device-management
    toNode: logging
    type: async
    label: Logs

  - fromNode: telemetry-service
    toNode: logging
    type: async
    label: Logs
