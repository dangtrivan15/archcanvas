kind: NodeDef
apiVersion: v1
metadata:
  name: stream-processor
  namespace: messaging
  version: "1.0.0"
  displayName: Stream Processor
  description: A real-time stream processing engine for continuous data transformation.
  icon: Activity
  tags:
    - messaging
    - streaming
    - realtime
spec:
  args:
    - name: engine
      type: enum
      description: Stream processing engine
      options:
        - Kafka Streams
        - Flink
        - Spark Streaming
        - Custom
      default: Kafka Streams
    - name: windowType
      type: enum
      description: Windowing strategy
      options:
        - tumbling
        - sliding
        - session
        - none
      default: tumbling
    - name: windowDuration
      type: duration
      description: Window duration
      default: 5m
  ports:
    - name: stream-in
      direction: inbound
      protocol:
        - Kafka
        - Kinesis
      description: Input stream
    - name: stream-out
      direction: outbound
      protocol:
        - Kafka
        - Kinesis
        - HTTP
      description: Processed output stream
  ai:
    context: "This is a stream processor. Consider exactly-once semantics, watermarks, late data handling, and state management."
    reviewHints:
      - Verify exactly-once processing guarantees
      - Check late data handling policy
      - Consider checkpoint interval
