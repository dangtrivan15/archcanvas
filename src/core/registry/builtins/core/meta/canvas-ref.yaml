kind: NodeDef
apiVersion: v1
metadata:
  name: canvas-ref
  namespace: meta
  version: "1.0.0"
  displayName: Architecture Canvas
  description: A container node representing a child architecture as a nested canvas. Supports both local .archc file paths and remote git repository URLs. Shows the reference name and a visual affordance indicating it can be opened to reveal its internal architecture.
  icon: FolderOpen
  tags:
    - meta
    - canvas
    - nested
    - container
  shape: container
spec:
  args:
    - name: filePath
      type: string
      required: false
      description: Relative path to the child .archc file (e.g., ./child-system.archc). Use this for local references.
      default: ""
    - name: repoUrl
      type: string
      required: false
      description: Git repository URL for remote architecture reference (e.g., https://github.com/org/repo.git). The node resolves to main.archc at the repository root.
      default: ""
    - name: ref
      type: string
      required: false
      description: Git tag (preferred) or commit SHA to pin the version of the remote architecture reference (e.g., v1.2.0 or a1b2c3d)
      default: ""
    - name: nodeCount
      type: number
      description: Number of nodes in the referenced canvas
      default: 0
    - name: description
      type: string
      description: Short description of the child architecture
      default: ""
  ports:
    - name: in
      direction: inbound
      protocol:
        - archc-ref
      description: Incoming architecture references
    - name: out
      direction: outbound
      protocol:
        - archc-ref
      description: Outgoing architecture references
  ai:
    context: "This is a container node representing a nested architecture canvas. It can reference either a local .archc file via filePath, or a remote git repository via repoUrl. When using a git repo, the node resolves to main.archc at the repository root. Use the ref arg to pin a specific version — git tags (e.g., v1.2.0) are preferred over commit SHAs for readability."
    reviewHints:
      - Verify the referenced .archc file exists (for local filePath references)
      - Check that the nested architecture is well-defined
      - Consider the boundary between parent and child architectures
      - For git repo references, verify the repository URL is accessible
      - Ensure remote references use version pinning via the ref arg (tag preferred, commit SHA as fallback)
      - Confirm that either filePath or repoUrl is provided, not both
variants:
  - name: Git Repository Reference
    description: Reference a remote architecture from a git repository, pinned to a specific version tag
    args:
      repoUrl: "https://github.com/org/shared-architecture.git"
      ref: "v1.0.0"
      description: "Shared architecture from remote repository"
