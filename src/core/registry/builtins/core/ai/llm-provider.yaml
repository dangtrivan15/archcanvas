kind: NodeDef
apiVersion: v1
metadata:
  name: llm-provider
  namespace: ai
  version: "1.0.0"
  displayName: LLM Provider
  description: An external large language model endpoint. Represents LLM API providers such as OpenAI, Anthropic, Google Gemini, AWS Bedrock, Ollama, or vLLM.
  icon: Brain
  tags:
    - ai
    - llm
    - machine-learning
    - inference
  shape: rectangle
spec:
  args:
    - name: provider
      type: enum
      required: true
      description: The LLM provider or platform
      default: "OpenAI"
      options:
        - "OpenAI"
        - "Anthropic"
        - "Google Gemini"
        - "AWS Bedrock"
        - "Ollama"
        - "vLLM"
        - "Custom"
    - name: model
      type: string
      required: true
      description: The specific model identifier (e.g. gpt-4o, claude-sonnet-4-20250514, gemini-pro)
      default: "gpt-4o"
    - name: maxTokens
      type: number
      required: false
      description: Maximum number of tokens in the completion response
      default: 4096
    - name: temperature
      type: number
      required: false
      description: Sampling temperature (0.0 = deterministic, 1.0 = creative)
      default: 0.7
    - name: streaming
      type: boolean
      required: false
      description: Whether to stream the response token-by-token
      default: false
  ports:
    - name: prompt-request
      direction: inbound
      protocol:
        - HTTP
        - gRPC
      description: Inbound prompt/completion requests from client services
    - name: completion-response
      direction: outbound
      protocol:
        - HTTP
        - gRPC
      description: Outbound completion responses or streamed tokens
  children: []
  ai:
    context: "This is an LLM provider endpoint. Consider token limits, rate limiting, cost management, prompt injection defenses, response validation, timeout handling for long completions, and fallback strategies across providers."
    reviewHints:
      - Verify API key management and secret rotation
      - Check rate limiting and retry logic with exponential backoff
      - Consider cost monitoring and budget alerts
      - Ensure prompt injection defenses are in place
      - Review streaming vs batch tradeoffs for latency requirements
      - Consider multi-provider fallback for reliability
variants:
  - name: GPT-4o
    description: OpenAI GPT-4o model endpoint
    args:
      provider: "OpenAI"
      model: "gpt-4o"
      maxTokens: 4096
      temperature: 0.7
      streaming: false
  - name: Claude Sonnet
    description: Anthropic Claude Sonnet model endpoint
    args:
      provider: "Anthropic"
      model: "claude-sonnet-4-20250514"
      maxTokens: 4096
      temperature: 0.7
      streaming: true
  - name: Gemini Pro
    description: Google Gemini Pro model endpoint
    args:
      provider: "Google Gemini"
      model: "gemini-pro"
      maxTokens: 8192
      temperature: 0.5
      streaming: false
