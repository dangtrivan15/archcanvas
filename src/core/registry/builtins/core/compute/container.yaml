kind: NodeDef
apiVersion: v1
metadata:
  name: container
  namespace: compute
  version: "1.0.0"
  displayName: Container
  description: A container or pod deployment unit representing Docker containers, ECS Tasks, Kubernetes Pods, or Cloud Run services. Encapsulates a single deployable unit with its resource requirements.
  icon: Container
  tags:
    - compute
    - container
    - docker
    - kubernetes
    - pod
  shape: rectangle
spec:
  args:
    - name: runtime
      type: enum
      required: true
      description: Container orchestration platform
      default: "Docker"
      options:
        - "Docker"
        - "ECS"
        - "Kubernetes"
        - "Cloud Run"
        - "Fargate"
    - name: image
      type: string
      required: true
      description: Container image reference (e.g. "nginx:latest", "my-app:v1.2.3")
      default: "app:latest"
    - name: cpu
      type: string
      required: false
      description: CPU allocation (e.g. "256m", "1", "2 vCPU")
      default: "256m"
    - name: memory
      type: string
      required: false
      description: Memory allocation (e.g. "512Mi", "1Gi", "2048MB")
      default: "512Mi"
    - name: replicas
      type: number
      required: false
      description: Number of container replicas to run
      default: 1
    - name: healthCheckPath
      type: string
      required: false
      description: HTTP health check endpoint path (e.g. "/health", "/readyz")
      default: "/health"
  ports:
    - name: inbound
      direction: inbound
      protocol:
        - HTTP
        - gRPC
        - TCP
      description: Inbound traffic to the container
    - name: outbound
      direction: outbound
      protocol:
        - HTTP
        - gRPC
        - TCP
      description: Outbound dependencies from the container
  children: []
  ai:
    context: "This is a container/pod deployment unit. Consider resource limits, health checks, graceful shutdown, image tagging strategy (avoid :latest in production), and security context (non-root, read-only filesystem)."
    reviewHints:
      - Verify container image uses a specific tag, not :latest
      - Check CPU and memory limits are appropriate for the workload
      - Ensure health check path returns meaningful status
      - Consider liveness vs readiness probe separation
      - Review replica count for high availability requirements
variants:
  - name: Docker Standalone
    description: Single Docker container with basic resource limits
    args:
      runtime: "Docker"
      image: "app:latest"
      cpu: "512m"
      memory: "1Gi"
      replicas: 1
      healthCheckPath: "/health"
  - name: Kubernetes Pod
    description: Kubernetes pod with multiple replicas
    args:
      runtime: "Kubernetes"
      image: "app:v1.0.0"
      cpu: "256m"
      memory: "512Mi"
      replicas: 3
      healthCheckPath: "/readyz"
  - name: ECS Fargate Task
    description: AWS Fargate serverless container task
    args:
      runtime: "Fargate"
      image: "123456789.dkr.ecr.us-east-1.amazonaws.com/app:latest"
      cpu: "1 vCPU"
      memory: "2048MB"
      replicas: 2
      healthCheckPath: "/health"
  - name: Cloud Run Service
    description: Google Cloud Run managed container
    args:
      runtime: "Cloud Run"
      image: "gcr.io/project/app:latest"
      cpu: "1"
      memory: "512Mi"
      replicas: 1
      healthCheckPath: "/health"
