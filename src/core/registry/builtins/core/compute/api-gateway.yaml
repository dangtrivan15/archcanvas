kind: NodeDef
apiVersion: v1
metadata:
  name: api-gateway
  namespace: compute
  version: "1.0.0"
  displayName: API Gateway
  description: An API gateway that routes, authenticates, and rate-limits incoming requests.
  icon: Shield
  tags:
    - compute
    - gateway
    - routing
    - auth
spec:
  args:
    - name: provider
      type: enum
      description: Gateway provider
      options:
        - Kong
        - AWS API Gateway
        - Nginx
        - Envoy
        - Custom
      default: Custom
    - name: rateLimit
      type: number
      description: Rate limit (requests per minute)
      default: 1000
    - name: authMethod
      type: enum
      description: Authentication method
      options:
        - JWT
        - API Key
        - OAuth2
        - None
      default: JWT
  ports:
    - name: public-in
      direction: inbound
      protocol:
        - HTTP
        - HTTPS
      description: Public-facing ingress
    - name: route-out
      direction: outbound
      protocol:
        - HTTP
        - gRPC
      description: Routed requests to backend services
  ai:
    context: "This is an API gateway. Consider authentication, rate limiting, request validation, and CORS policies."
    reviewHints:
      - Verify rate limiting is configured
      - Check CORS policy
      - Ensure authentication is enforced
