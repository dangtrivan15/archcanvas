kind: NodeDef
apiVersion: v1
metadata:
  name: service
  namespace: compute
  version: "1.0.0"
  displayName: Service
  description: A deployable backend service that handles business logic and exposes APIs.
  icon: Server
  tags:
    - compute
    - backend
    - microservice
spec:
  args:
    - name: language
      type: enum
      required: true
      description: Primary programming language
      options:
        - TypeScript
        - Python
        - Go
        - Java
        - Rust
        - "C#"
      default: TypeScript
    - name: framework
      type: string
      description: Web framework used
      default: Express
    - name: replicas
      type: number
      description: Number of running instances
      default: 1
    - name: healthCheck
      type: string
      description: Health check endpoint path
      default: /health
  ports:
    - name: http-in
      direction: inbound
      protocol:
        - HTTP
        - HTTPS
      description: Incoming HTTP requests
    - name: http-out
      direction: outbound
      protocol:
        - HTTP
        - HTTPS
      description: Outgoing HTTP requests
    - name: grpc-in
      direction: inbound
      protocol:
        - gRPC
      description: Incoming gRPC calls
    - name: grpc-out
      direction: outbound
      protocol:
        - gRPC
      description: Outgoing gRPC calls
  children:
    - nodedef: compute/function
      min: 0
      max: 50
  ai:
    context: "This is a backend service. Consider its API surface, dependencies, scaling needs, and failure modes."
    reviewHints:
      - Check for single points of failure
      - Verify health check endpoint exists
      - Consider circuit breakers for outbound calls
variants:
  - name: REST API
    description: RESTful HTTP service
    args:
      framework: Express
  - name: gRPC Service
    description: gRPC-based microservice
    args:
      framework: gRPC
