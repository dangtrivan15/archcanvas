kind: NodeDef
apiVersion: v1
metadata:
  name: worker
  namespace: compute
  version: "1.0.0"
  displayName: Worker
  description: A background worker process that consumes tasks from a queue or schedule.
  icon: Cog
  tags:
    - compute
    - background
    - async
spec:
  args:
    - name: concurrency
      type: number
      description: Number of concurrent tasks
      default: 5
    - name: retryPolicy
      type: enum
      description: Retry behavior on failure
      options:
        - none
        - fixed
        - exponential
      default: exponential
    - name: maxRetries
      type: number
      description: Maximum retry attempts
      default: 3
  ports:
    - name: queue-in
      direction: inbound
      protocol:
        - AMQP
        - SQS
      description: Task queue input
    - name: result-out
      direction: outbound
      protocol:
        - HTTP
        - Event
      description: Task result output
  ai:
    context: "This is a background worker. Consider idempotency, retry behavior, dead letter queues, and monitoring."
    reviewHints:
      - Verify idempotent task processing
      - Check dead letter queue configuration
      - Consider backpressure handling
