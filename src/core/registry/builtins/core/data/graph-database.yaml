kind: NodeDef
apiVersion: v1
metadata:
  name: graph-database
  namespace: data
  version: "1.0.0"
  displayName: Graph Database
  description: A graph database for relationship-heavy data, optimized for traversals, pattern matching, and connected data queries. Used for social networks, knowledge graphs, fraud detection, and dependency analysis.
  icon: Network
  tags:
    - data
    - graph
    - relationships
    - knowledge-graph
  shape: cylinder
spec:
  args:
    - name: engine
      type: enum
      required: true
      description: Graph database engine
      options:
        - Neo4j
        - Amazon Neptune
        - ArangoDB
        - Dgraph
        - TigerGraph
      default: Neo4j
    - name: queryLanguage
      type: enum
      description: Primary query language
      options:
        - Cypher
        - Gremlin
        - GraphQL
        - GSQL
        - AQL
      default: Cypher
    - name: storageGB
      type: number
      description: Allocated storage in GB
      default: 50
    - name: replication
      type: enum
      description: Replication mode
      options:
        - none
        - primary-replica
        - multi-primary
      default: none
  ports:
    - name: graph-query
      direction: inbound
      protocol:
        - Bolt
        - HTTP
        - Gremlin
      description: Incoming graph queries and traversals
    - name: graph-write
      direction: inbound
      protocol:
        - Bolt
        - HTTP
      description: Write nodes, edges, and properties
    - name: graph-results
      direction: outbound
      protocol:
        - Bolt
        - HTTP
      description: Query results and traversal paths
  variants:
    - name: Neo4j
      description: Leading native graph database with Cypher query language
      args:
        engine: Neo4j
        queryLanguage: Cypher
    - name: Amazon Neptune
      description: Managed graph database service with Gremlin support
      args:
        engine: Amazon Neptune
        queryLanguage: Gremlin
  ai:
    context: "This is a graph database node for relationship-heavy data. Consider graph data modeling (nodes vs edges vs properties), query optimization for traversals, indexing strategy, and consistency requirements."
    reviewHints:
      - Verify graph data model suits the use case (property graph vs RDF)
      - Check query complexity and traversal depth limits
      - Consider indexing for frequently queried properties
      - Plan for graph growth and scaling strategy
