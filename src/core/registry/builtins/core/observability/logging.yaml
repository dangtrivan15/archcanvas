kind: NodeDef
apiVersion: v1
metadata:
  name: logging
  namespace: observability
  version: "1.0.0"
  displayName: Logging
  description: A centralized logging system for collecting, storing, and querying application logs.
  icon: FileText
  tags:
    - observability
    - logging
    - debugging
spec:
  args:
    - name: stack
      type: enum
      description: Logging stack
      options:
        - ELK
        - Loki/Grafana
        - Datadog
        - CloudWatch
        - Custom
      default: ELK
    - name: retentionDays
      type: number
      description: Log retention in days
      default: 30
    - name: structuredLogs
      type: boolean
      description: Use structured (JSON) logging
      default: true
  ports:
    - name: logs-in
      direction: inbound
      protocol:
        - Syslog
        - HTTP
        - Fluent
      description: Log ingestion
    - name: alerts-out
      direction: outbound
      protocol:
        - HTTP
        - Email
        - Slack
      description: Log-based alerts
  ai:
    context: "This is a logging system. Consider log levels, structured logging format, retention policies, and alert configuration."
    reviewHints:
      - Verify structured logging is enabled
      - Check log sampling for high-volume services
      - Consider PII scrubbing in logs
