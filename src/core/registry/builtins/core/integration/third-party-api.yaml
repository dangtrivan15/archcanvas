kind: NodeDef
apiVersion: v1
metadata:
  name: third-party-api
  namespace: integration
  version: "1.0.0"
  displayName: Third-Party API
  description: An external SaaS dependency such as Stripe, Twilio, SendGrid, or a generic REST/GraphQL API that the system integrates with.
  icon: Plug
  tags:
    - integration
    - api
    - third-party
    - saas
  shape: rectangle
spec:
  args:
    - name: serviceName
      type: string
      required: true
      description: Name of the external service (e.g. Stripe, Twilio, SendGrid)
      default: "External API"
    - name: baseUrl
      type: string
      required: true
      description: Base URL of the API endpoint
      default: "https://api.example.com"
    - name: authMethod
      type: enum
      required: true
      description: Authentication method used to access the API
      options:
        - API Key
        - OAuth2
        - Bearer Token
        - None
      default: API Key
    - name: rateLimit
      type: number
      description: Maximum requests per second allowed by the API
      default: 100
  ports:
    - name: api-call
      direction: inbound
      protocol:
        - HTTPS
        - REST
        - GraphQL
      description: Incoming API call requests to the third-party service
    - name: api-response
      direction: outbound
      protocol:
        - HTTPS
        - REST
        - GraphQL
      description: Outgoing API responses from the third-party service
  children: []
  ai:
    context: "This is a third-party API integration point. Consider rate limiting, retry policies, circuit breakers, timeout configuration, and API versioning."
    reviewHints:
      - Verify rate limit handling and backoff strategies
      - Check authentication credentials are stored securely (e.g. in a vault)
      - Ensure timeout and circuit breaker patterns are in place
      - Review API versioning strategy
variants:
  - name: Stripe
    description: Stripe payment processing API
    args:
      serviceName: Stripe
      baseUrl: "https://api.stripe.com/v1"
      authMethod: Bearer Token
      rateLimit: 100
  - name: Twilio
    description: Twilio communications API (SMS, Voice, Video)
    args:
      serviceName: Twilio
      baseUrl: "https://api.twilio.com/2010-04-01"
      authMethod: API Key
      rateLimit: 50
  - name: SendGrid
    description: SendGrid email delivery API
    args:
      serviceName: SendGrid
      baseUrl: "https://api.sendgrid.com/v3"
      authMethod: API Key
      rateLimit: 600
  - name: Generic REST API
    description: Generic REST API integration
    args:
      serviceName: External API
      baseUrl: "https://api.example.com"
      authMethod: API Key
      rateLimit: 100
