kind: NodeDef
apiVersion: v1

metadata:
  name: pubsub
  namespace: gcp
  version: "1.0.0"
  displayName: GCP Pub/Sub
  description: "Google Cloud Pub/Sub messaging and event streaming service."
  icon: Radio
  tags: [gcp, messaging, pubsub, cloud]
  shape: parallelogram

spec:
  args:
    - name: messageRetention
      type: duration
      description: "How long messages are retained."
  ports:
    - name: publish
      direction: inbound
      protocol: [gRPC, HTTPS]
    - name: subscribe
      direction: outbound
      protocol: [gRPC, HTTPS]
