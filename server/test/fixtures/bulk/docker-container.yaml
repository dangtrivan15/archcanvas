kind: NodeDef
apiVersion: v1

metadata:
  name: container
  namespace: docker
  version: "1.0.0"
  displayName: Docker Container
  description: "A Docker container for running isolated applications."
  icon: Box
  tags: [docker, container, virtualization]
  shape: rectangle

spec:
  args:
    - name: image
      type: string
      required: true
    - name: exposedPort
      type: number
      description: "Port to expose."
  ports:
    - name: tcp
      direction: inbound
      protocol: [TCP]
